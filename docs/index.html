<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hill View Primary School — Reports</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1a6b3c;--gl:#e8f5ee;--gm:#0f4a2a;--gx:#c8f0d8;
  --bg:#f3f5f3;--surface:#fff;--border:#dde6dd;
  --text:#1a1f1a;--muted:#6b7b6b;--danger:#c0392b;--warn:#f39c12;
  --r:8px;--rl:12px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;min-height:100vh}
.navbar{background:var(--g);color:#fff;display:flex;align-items:center;gap:12px;padding:0 20px;height:52px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.nav-brand{font-weight:700;font-size:15px;flex:1;letter-spacing:-.01em}
.nav-user{font-size:12px;opacity:.9}
.badge-role{font-size:11px;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.btn-signout{background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 14px;border-radius:var(--r);cursor:pointer;font-size:12px;transition:background .2s}
.btn-signout:hover{background:rgba(255,255,255,.28)}
.main{display:flex;flex:1;min-height:0}
.sidebar{width:196px;background:var(--surface);border-right:1px solid var(--border);padding:10px 0;flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:9px;width:100%;padding:10px 18px;border:none;border-left:3px solid transparent;background:transparent;color:var(--muted);font-size:13px;cursor:pointer;text-align:left;transition:all .15s}
.nav-item:hover{background:var(--gl);color:var(--g)}
.nav-item.active{border-left-color:var(--g);background:var(--gl);color:var(--g);font-weight:600}
.content{flex:1;overflow-y:auto;padding:24px}
/* ── INPUTS ── */
input,select,textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;color:var(--text);background:var(--surface);outline:none;transition:border .15s;font-family:inherit}
input:focus,select:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(26,107,60,.1)}
input[type=number]{width:62px;text-align:center;padding:4px 5px;font-size:13px}
input.inline-num{width:62px;text-align:center;padding:4px 5px;font-size:13px}
/* ── BUTTONS ── */
.btn{padding:8px 18px;border-radius:var(--r);border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--g);color:#fff}.btn-primary:hover{background:var(--gm)}.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--g);color:var(--g)}.btn-ghost:hover{background:var(--gl)}
.btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger)}.btn-danger:hover{background:#fde0e0}
.btn-sm{padding:4px 12px;font-size:12px}
/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px}
.mc-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.mc{background:var(--gl);border-radius:var(--r);padding:16px;text-align:center}
.mc-val{font-size:26px;font-weight:700;color:var(--g)}
.mc-lbl{font-size:12px;color:var(--muted);margin-top:3px}
/* ── TABLES ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:8px 10px;background:var(--bg);font-weight:600;color:var(--muted);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;font-size:12px}
tbody td{padding:7px 10px;border-bottom:1px solid #f0f4f0;vertical-align:middle}
tbody tr:hover td{background:#fafcfa}
.sticky-col{position:sticky;left:0;background:var(--surface);z-index:1;font-weight:500}
thead .sticky-col{background:var(--bg)}
/* ── SCORE BADGES ── */
.sb{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:500}
.sb-a{background:#d1f0dc;color:#0a4f24}.sb-b{background:#d0e8ff;color:#0a3a6b}
.sb-c{background:#fff3cd;color:#7a5300}.sb-f{background:#fde0e0;color:#7a1111}
.pb{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:700}
.pb-1{background:#fff0a0;color:#7a5300}.pb-2{background:#f0f0f0;color:#555}.pb-n{background:#f0f0f0;color:var(--muted)}
.grade-b{display:inline-block;padding:3px 14px;border-radius:20px;font-size:13px;font-weight:700}
/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:32px;width:380px}
.login-logo{width:54px;height:54px;background:var(--g);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.login-h1{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.err-box{font-size:12px;color:var(--danger);padding:9px 12px;background:#fde0e0;border-radius:var(--r);margin-bottom:12px;white-space:pre-line;line-height:1.6}

/* ── MISC ── */
.page-h{font-size:20px;font-weight:700;color:var(--g);margin-bottom:20px}
.section-h{font-size:15px;font-weight:600;color:var(--muted);margin-bottom:14px}
.pill{font-size:12px;background:var(--gl);color:var(--g);padding:3px 12px;border-radius:20px;font-weight:600;display:inline-block}
.pill-grey{background:#f0f0f0;color:var(--muted)}
.hdr-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.save-toast{position:fixed;bottom:24px;right:24px;background:var(--g);color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999}
.save-toast.show{opacity:1}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--g);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.loader{display:flex;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--muted);padding:60px}
.two-col{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
.empty{padding:24px;text-align:center;color:var(--muted);font-size:13px}
.msg-ok{font-size:12px;color:#0a4f24;background:#d1f0dc;padding:7px 12px;border-radius:var(--r)}
.msg-err{font-size:12px;color:var(--danger);background:#fde0e0;padding:7px 12px;border-radius:var(--r)}
.inline-form{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.inline-form input{flex:1;min-width:180px}
.marks-actions{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.changed-dot{width:7px;height:7px;border-radius:50%;background:var(--warn);display:inline-block;margin-left:4px;vertical-align:middle}
/* report print */
@media print{
  .no-print{display:none!important}
  .sidebar,.navbar{display:none!important}
  .content{padding:0}
  .report-card{max-width:none}
}
/* Submission status */
.sub-bar{height:8px;border-radius:20px;background:#e8e8e8;overflow:hidden;margin-top:4px}
.sub-fill{height:100%;border-radius:20px;background:var(--g);transition:width .4s}
/* Report card (in-page) */
.report-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:28px;max-width:760px}
.report-card h1{font-size:22px;font-weight:700;text-align:center;color:var(--g);margin-bottom:4px}
.report-card .sub{text-align:center;font-size:12px;color:var(--muted);margin-bottom:20px}
.report-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:14px;background:var(--gl);border-radius:var(--r);margin-bottom:18px}
.report-meta div{font-size:13px}
.report-meta strong{display:block;font-size:18px;font-weight:700;color:var(--g)}
.report-meta span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
/* ── EXCEL TABLE ── */
.excel-wrap{overflow-x:auto;border:1px solid #c8d8c8;border-radius:var(--r)}
.excel-tbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:auto}
.excel-tbl thead th{padding:7px 10px;background:#e8f0e8;font-weight:600;color:#2d4a2d;text-align:center;border-right:1px solid #c8d8c8;border-bottom:2px solid #9fbe9f;white-space:nowrap;font-size:12px;position:sticky;top:0;z-index:2}
.excel-tbl thead th.name-col{text-align:left;position:sticky;left:0;z-index:3;background:#d8ead8;min-width:160px}
.excel-tbl tbody td{padding:0;border-right:1px solid #dde8dd;border-bottom:1px solid #dde8dd;vertical-align:middle}
.excel-tbl tbody td.name-col{padding:6px 10px;font-weight:500;position:sticky;left:0;background:#f5faf5;z-index:1;border-right:2px solid #9fbe9f;white-space:nowrap}
.excel-tbl tbody tr:hover td{background:#f0f8f0}.excel-tbl tbody tr:hover td.name-col{background:#eaf4ea}
.excel-tbl tbody td.stat-col{padding:6px 8px;text-align:center;background:#f5faf5;border-right:1px solid #c8d8c8;font-weight:600;font-size:13px;white-space:nowrap}
.excel-tbl tbody td.act-col{padding:4px 8px;text-align:center;background:#f5faf5;border-right:none;white-space:nowrap}
.xcel-inp{width:58px;border:none;border-radius:0;padding:5px 4px;text-align:center;font-size:13px;background:transparent;color:var(--text);outline:none;display:block;margin:0 auto}
.xcel-inp:focus{background:#fffde7;box-shadow:inset 0 0 0 2px var(--warn);border-radius:3px}
.xcel-inp.changed{background:#fffbf0;color:#7a5300}
.excel-tbl tbody td.input-cell{padding:1px;text-align:center}
.excel-tbl tbody td.input-cell:focus-within{background:#fffde7;outline:2px solid var(--warn);outline-offset:-2px;z-index:2;position:relative}
/* add-pupil panel */
.add-pupil-panel{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--gl);border-top:2px dashed #9fbe9f;border-radius:0 0 var(--r) var(--r)}
.add-pupil-panel input{max-width:240px;padding:7px 11px;font-size:13px}
/* generate all */
.gen-all-btn{background:var(--g);color:#fff;border:none;padding:9px 20px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .15s}
.gen-all-btn:hover{background:var(--gm)}.gen-all-btn:disabled{opacity:.5;cursor:not-allowed}
.gen-progress{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
/* responsive */
@media(max-width:900px){.two-col{grid-template-columns:1fr}.mc-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.sidebar{width:44px}.nav-item span{display:none}.content{padding:14px}}
</style>
</head>
<body>
<div id="app"></div>
<div class="save-toast" id="toast">✓ Marks saved</div>

<script>
// ══════════════════════════════════════════════════
//  CONFIG — matches hill-view-ps Supabase project
// ══════════════════════════════════════════════════
const SUPA_URL = 'https://gtguutliwmhntuigcqta.supabase.co';
const SUPA_KEY = 'sb_publishable_32CnYot-3Kn2ysRljL9-zQ_G5r_QqLI';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

// ══════════════════════════════════════════════════
//  SCHEMA KNOWLEDGE (matches seed.sql exactly)
//  Subject levels: 'nursery' | 'p1-p3' | 'p4-p7'
//  Class→level:  KG* → nursery, P1/P2/P3 → p1-p3, P4+ → p4-p7
//  P7 grade: class name starts with 'P7'
// ══════════════════════════════════════════════════
const resolveLevel = name => {
  if (name.startsWith('KG'))  return 'nursery';
  if (/^P[123]/.test(name))   return 'p1-p3';
  return 'p4-p7';
};
const isP7Class = name => /^P7/.test(name);

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
const S = {
  user: null,          // from users table
  view: 'overview',
  // data
  classes: [], subjects: [], pupils: [], marksMap: {},
  // admin analytics (from views)
  classPerf: [], submissions: [],
  // teacher
  selClass: null,      // admin class selector
  pending: {},         // `${pupil_id}::${subject_id}` → score (unsaved)
  saving: false,
  saveMsg: null,
  // report page
  reportPupils: [],
  reportSelId: null,
  reportSummary: null,
  reportSubjects: [],
  // ui
  loading: true,
  chartInst: null,
  toastTimer: null,
};

// ══════════════════════════════════════════════════
//  CALC (client-side live recalc from pending edits)
// ══════════════════════════════════════════════════
const toAgg    = s => s>=90?1:s>=80?2:s>=70?3:s>=60?4:s>=50?5:s>=40?6:s>=30?7:8;
const pleGrade = t => t===4?'D1':t<=6?'D2':t<=8?'C3':t<=10?'C4':t<=12?'P5':t<=14?'P6':t<=16?'P7':'F9';
const gradeStyle = g => {
  if(['D1','D2'].includes(g)) return'background:#d1f0dc;color:#0a4f24';
  if(['C3','C4'].includes(g)) return'background:#d0e8ff;color:#0a3a6b';
  if(['P5','P6','P7'].includes(g)) return'background:#fff3cd;color:#7a5300';
  return'background:#fde0e0;color:#7a1111';
};
const scoreClass = v => v>=80?'sb-a':v>=60?'sb-b':v>=40?'sb-c':'sb-f';
const scoreLabel = v => v>=80?'Excellent':v>=60?'Good':v>=40?'Average':'Needs Improvement';

const markKey = (pid, sid) => `${pid}::${sid}`;
const getScore = (pid, sid) => {
  const k = markKey(pid, sid);
  return S.pending[k] !== undefined ? S.pending[k] : (S.marksMap[k] ?? 0);
};

function classSubs(classId) {
  const cls = S.classes.find(c=>c.id===classId); if(!cls) return [];
  return S.subjects.filter(s=>s.level===resolveLevel(cls.name));
}

function rankPupils(classId) {
  const subs = classSubs(classId);
  return S.pupils.filter(p=>p.class_id===classId)
    .map(p=>{
      const scores = subs.map(s=>getScore(p.id,s.id));
      const total  = scores.reduce((a,b)=>a+b,0);
      const avg    = subs.length?total/subs.length:0;
      return{...p,scores,total,avg};
    })
    .sort((a,b)=>b.avg-a.avg)
    .map((p,i)=>({...p,pos:i+1}));
}

function pleCalc(pupilId, classId) {
  const subs = classSubs(classId); // p4-p7 level subs
  const aggs = subs.map(s=>({s,sc:getScore(pupilId,s.id),ag:toAgg(getScore(pupilId,s.id))}));
  const best4= [...aggs].sort((a,b)=>a.ag-b.ag).slice(0,4);
  const tot  = best4.reduce((s,a)=>s+a.ag,0);
  return{aggs,best4,tot,grade:pleGrade(tot)};
}

// ══════════════════════════════════════════════════
//  DATA LOADING
// ══════════════════════════════════════════════════
async function loadAll() {
  S.loading=true; render();

  // Core tables
  const [clsR,subR,pupR] = await Promise.all([
    db.from('classes').select('id,name').order('name'),
    db.from('subjects').select('id,name,level').order('name'),
    db.from('pupils').select('id,name,class_id').order('name'),  // RLS filters teachers
  ]);
  S.classes  = clsR.data  || [];
  S.subjects = subR.data  || [];
  S.pupils   = pupR.data  || [];

  // Marks
  S.marksMap = {};
  const pids = S.pupils.map(p=>p.id);
  if(pids.length) {
    for(let i=0;i<pids.length;i+=200) {
      const {data:mks} = await db.from('marks').select('pupil_id,subject_id,score').in('pupil_id',pids.slice(i,i+200));
      (mks||[]).forEach(m=>{ S.marksMap[markKey(m.pupil_id,m.subject_id)]=m.score; });
    }
  }

  // Admin: load views
  if(S.user.role==='admin') {
    const [perfR,subStatusR] = await Promise.all([
      db.from('class_performance').select('class_id,class_name,average_score,best_pupil,weakest_pupil').order('class_name'),
      db.from('teacher_submission_status').select('teacher_name,class_name,subjects_entered,subject_count').order('class_name'),
    ]);
    S.classPerf   = perfR.data   || [];
    S.submissions = subStatusR.data || [];
  }

  // Default selection
  if(!S.selClass) S.selClass = S.classes[0]?.id||null;

  S.loading=false; S.pending={}; render();
}

async function loadReportPupils() {
  const {data} = await db.from('pupil_report_summary')
    .select('pupil_id,pupil_name,class_name').order('class_name').order('pupil_name');
  S.reportPupils = data||[];
  if(!S.reportSelId && S.reportPupils.length) S.reportSelId=S.reportPupils[0].pupil_id;
  if(S.reportSelId) await loadReportForPupil(S.reportSelId);
  else render();
}

async function loadReportForPupil(pupilId) {
  S.reportSelId=pupilId;
  const [sumR,subjR] = await Promise.all([
    db.from('pupil_report_summary').select('pupil_id,pupil_name,class_name,total_score,average_score,position,uneb_grade').eq('pupil_id',pupilId).single(),
    db.from('pupil_report_subjects').select('subject_name,score').eq('pupil_id',pupilId),
  ]);
  S.reportSummary  = sumR.data||null;
  S.reportSubjects = subjR.data||[];
  render();
}

// ══════════════════════════════════════════════════
//  MARKS SAVE (batch — matches /api/teacher/marks)
// ══════════════════════════════════════════════════
async function saveMarks() {
  const updates = Object.entries(S.pending).map(([k,score])=>{
    const [pupil_id,subject_id]=k.split('::');
    return{pupil_id,subject_id,score:parseInt(score)||0};
  });
  if(!updates.length){S.saveMsg='No changes to save.';render();return;}
  S.saving=true; S.saveMsg=null; render();
  const {data:{user}} = await db.auth.getUser();
  const payload = updates.map(u=>({...u,teacher_id:user.id}));
  const {error} = await db.from('marks').upsert(payload,{onConflict:'pupil_id,subject_id'});
  if(error){S.saveMsg='Error: '+error.message;}
  else{
    updates.forEach(u=>{ S.marksMap[markKey(u.pupil_id,u.subject_id)]=u.score; });
    S.pending={}; S.saveMsg='Marks saved successfully.';
    flashToast();
  }
  S.saving=false; render();
}

async function addPupil(name, classId) {
  const {data,error} = await db.from('pupils').insert({name,class_id:classId}).select('id,name,class_id').single();
  if(error) return error.message;
  S.pupils=[...S.pupils,data];
  render(); return null;
}

function setPending(pid, sid, val) {
  const v = Math.max(0,Math.min(100,parseInt(val)||0));
  S.pending[markKey(pid,sid)]=v;
  // live-update avg/pos in DOM without full re-render
  refreshLiveRow(pid, sid);
}

function refreshLiveRow(pid, sid) {
  const p = S.pupils.find(x=>x.id===pid); if(!p) return;
  const cid=p.class_id;
  const cls=S.classes.find(c=>c.id===cid);
  const p7=cls&&isP7Class(cls.name);
  rankPupils(cid).forEach(rp=>{
    const goodColor=rp.avg>=60?'var(--g)':'var(--danger)';
    const te=document.getElementById(`tot-${rp.id}`); if(te){te.textContent=rp.total;te.style.color=goodColor;}
    const ae=document.getElementById(`avg-${rp.id}`); if(ae){ae.textContent=rp.avg.toFixed(1);ae.style.color=goodColor;}
    const pe=document.getElementById(`pos-${rp.id}`); if(pe){pe.innerHTML='';pe.appendChild(mkPosB(rp.pos));}
    if(p7){const ge=document.getElementById(`grade-${rp.id}`);if(ge){const pd=pleCalc(rp.id,cid);ge.innerHTML='';const s=e('span',{class:'grade-b',style:gradeStyle(pd.grade)});s.textContent=pd.grade;ge.appendChild(s);}}
  });
}

function flashToast() {
  if(S.toastTimer) clearTimeout(S.toastTimer);
  const t=document.getElementById('toast'); if(t){t.classList.add('show');S.toastTimer=setTimeout(()=>t.classList.remove('show'),2200);}
}

// ══════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════
async function signIn(email,pw) {
  const {data,error} = await db.auth.signInWithPassword({email,password:pw});
  if(error) {
    if(error.message.includes('Invalid login')) return 'Wrong email or password.';
    if(error.message.includes('Email not confirmed')) return 'Email not confirmed — check your inbox or disable email confirmation in Supabase Auth settings.';
    return 'Auth error: '+error.message;
  }
  // Read from 'users' table — matches hill-view-ps schema (NOT 'profiles')
  const {data:u,error:ue} = await db.from('users').select('id,name,email,role,class_id').eq('id',data.user.id).single();
  if(ue) return `Auth OK but users table error: "${ue.message}". Check that mock_data.sql was run with the correct auth user IDs.`;
  if(!u) return 'Auth OK but no row in users table for this account. Run mock_data.sql and replace UUID placeholders with real auth user IDs.';
  S.user=u; S.view=u.role==='admin'?'overview':'marks';
  await loadAll(); return null;
}

// Score → number of filled circles (out of 5)
function scoreToDots(score) {
  if (score >= 90) return 5;
  if (score >= 75) return 4;
  if (score >= 60) return 3;
  if (score >= 45) return 2;
  if (score >= 25) return 1;
  return 0;
}

function renderDots(filled, total=5) {
  let out = '';
  for (let i = 0; i < total; i++) {
    if (i < filled) {
      // Only marks circles are shaded
      out += `<span class="dot dot-filled"></span>`;
    } else {
      out += `<span class="dot dot-empty"></span>`;
    }
  }
  return out;
}

function dotLabel(filled) {
  const labels = ['Beginning','Developing','Approaching','Meeting','Exceeding'];
  return labels[Math.min(filled, 4)] || 'Beginning';
}

function e(tag,attrs,...kids){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='class')el.className=v;
    else if(k==='style')el.style.cssText=v;
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  kids.flat().forEach(c=>{if(c!=null)el.append(typeof c==='string'?c:c);});
  return el;
}
const d=(cls,st,...ch)=>e('div',{class:cls||'',style:st||''},...ch);
const mkSB  = v=>{const s=e('span',{class:`sb ${scoreClass(v)}`});s.textContent=v;return s;};
const mkPosB= p=>{const s=e('span',{class:`pb ${p===1?'pb-1':p<=3?'pb-2':'pb-n'}`});s.textContent=`#${p}`;return s;};

  }
  if (!subs.length) {
    const msg=d('empty'); msg.textContent='No subjects configured for this level.'; return msg;
  }

  // ── outer wrapper
  const outer = d('');

  if (!ranked.length) {
    const tr=document.createElement('tr');

        td.appendChild(mkSB(val));
      } else {
        const isPending = S.pending[markKey(p.id,s.id)]!==undefined;
        const inp=e('input',{
          type:'number',min:'0',max:'100',step:'1',value:val,
          class:'xcel-inp'+(isPending?' changed':''),
          title:`${p.name} — ${s.name}`
        });
        inp.addEventListener('focus',()=>inp.select());
        inp.addEventListener('input',ev=>{
          inp.classList.add('changed');
          setPending(p.id,s.id,ev.target.value);
        });
        // Tab/Enter navigation to next cell
        inp.addEventListener('keydown',ev=>{
          if(ev.key==='Enter'||ev.key==='Tab'){
            ev.preventDefault();
            const allInps=[...document.querySelectorAll('.xcel-inp')];
            const idx=allInps.indexOf(inp);
            const next=allInps[idx+1]; if(next)next.focus();
          }
        });
        td.appendChild(inp);
      }
      tr.appendChild(td);
    });

    // Total
    const tdTot=e('td',{class:'stat-col'});
    const totEl=e('span',{id:`tot-${p.id}`,style:`font-size:13px;font-weight:700;color:${p.avg>=60?'var(--g)':'var(--danger)'}`}); totEl.textContent=p.total; tdTot.appendChild(totEl); tr.appendChild(tdTot);

    // Avg
    const tdA=e('td',{class:'stat-col'});
    const avgEl=e('strong',{id:`avg-${p.id}`,style:`color:${p.avg>=60?'var(--g)':'var(--danger)'}`}); avgEl.textContent=p.avg.toFixed(1); tdA.appendChild(avgEl); tr.appendChild(tdA);

    // Pos
    const tdP=e('td',{id:`pos-${p.id}`,class:'stat-col'}); tdP.appendChild(mkPosB(p.pos)); tr.appendChild(tdP);

    // P7 grade
    if(p7){
      const tdG=e('td',{id:`grade-${p.id}`,class:'stat-col'});
      const pd=pleCalc(p.id,classId);
      const gs=e('span',{class:'grade-b',style:gradeStyle(pd.grade)}); gs.textContent=pd.grade; tdG.appendChild(gs); tr.appendChild(tdG);
    }

    // Report btn
    const tdB=e('td',{class:'act-col'});
    const btn=e('button',{class:'btn btn-ghost btn-sm'}); btn.textContent='PDF';
    btn.addEventListener('click',()=>{
      const sum={pupil_name:p.name,class_name:cls?.name||'',total_score:p.total,average_score:p.avg,position:p.pos,uneb_grade:p7?pleCalc(p.id,classId).grade:null};
      printReport(sum, subs.map(s=>({subject_name:s.name,score:getScore(p.id,s.id)})));
    }); tdB.appendChild(btn); tr.appendChild(tdB);

    tbody.appendChild(tr);
  });

  tbl.appendChild(tbody); wrap.appendChild(tbl); outer.appendChild(wrap);

  // ── Add-pupil panel (bottom of excel block)
  if(canAdd){
    const panel=d('add-pupil-panel');
    const icon=e('span',{style:'font-size:18px;flex-shrink:0'}); icon.textContent='＋';
    const nameIn=e('input',{type:'text',placeholder:'New pupil full name…',style:'flex:1;max-width:280px'});
    const addBtn=e('button',{class:'btn btn-primary btn-sm'}); addBtn.textContent='Add Pupil';
    const msg=e('span',{style:'font-size:12px;color:var(--muted)'});

    const doAdd=async()=>{
      const nm=nameIn.value.trim(); if(!nm){msg.textContent='Enter a name first.';return;}
      addBtn.disabled=true; addBtn.innerHTML='<span class="spin"></span>';
      const err=await addPupil(nm,classId);
      if(err){msg.textContent='Error: '+err;addBtn.disabled=false;addBtn.textContent='Add Pupil';}
      else{msg.textContent='';nameIn.value='';nameIn.focus();}
    };
    addBtn.addEventListener('click',doAdd);
    nameIn.addEventListener('keydown',ev=>{if(ev.key==='Enter')doAdd();});
    panel.appendChild(icon); panel.appendChild(nameIn); panel.appendChild(addBtn); panel.appendChild(msg);
    outer.appendChild(panel);
  }

  return outer;
}

  const ei=e('input',{type:'email',id:'lemail',placeholder:'your@email.com',autocomplete:'email'}); ef.appendChild(ei); card.appendChild(ef);
  const pf=d('field'); const pl=e('label'); pl.textContent='Password'; pf.appendChild(pl);
  const pi=e('input',{type:'password',id:'lpw',placeholder:'••••••••',autocomplete:'current-password'}); pf.appendChild(pi); card.appendChild(pf);

  const btn=e('button',{class:'btn btn-primary',style:'width:100%;justify-content:center;margin-top:4px'}); btn.textContent='Sign in'; card.appendChild(btn);
  const doSI=async()=>{
    if(location.protocol==='file:'){
      renderLogin('Cannot run from file://  —  serve via HTTP:\n\npython3 -m http.server 3000\n\nthen open http://localhost:3000');
      return;
    }
    btn.disabled=true; btn.innerHTML='<span class="spin"></span>&ensp;Signing in…';
    const err=await signIn(ei.value.trim(),pi.value);
    if(err){btn.disabled=false;btn.textContent='Sign in';renderLogin(err);}
  };
  btn.addEventListener('click',doSI);
  pi.addEventListener('keydown',ev=>{if(ev.key==='Enter')doSI();});

  wrap.appendChild(card); root.appendChild(wrap); ei.focus();
}

// ══════════════════════════════════════════════════
//  NAVBAR + SIDEBAR
// ══════════════════════════════════════════════════
function renderNavbar() {
  const nav=e('nav',{class:'navbar'});
  nav.innerHTML=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="2" y="10" width="20" height="12" rx="2" stroke="#fff" stroke-width="1.5"/><path d="M12 2L2 10h20L12 2z" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/><rect x="9" y="14" width="6" height="8" fill="rgba(255,255,255,.4)"/></svg>`;
  const t=e('span',{class:'nav-brand'}); t.textContent='Hill View Primary School'; nav.appendChild(t);
  const u=e('span',{class:'nav-user'}); u.textContent=S.user.name; nav.appendChild(u);
  const r=e('span',{class:'badge-role'}); r.textContent=S.user.role; nav.appendChild(r);
  const lo=e('button',{class:'btn-signout',onclick:signOut}); lo.textContent='Sign out'; nav.appendChild(lo);
  return nav;
}

// ══════════════════════════════════════════════════
//  MAIN RENDER
// ══════════════════════════════════════════════════
function render() {
  const root=document.getElementById('app'); root.innerHTML='';
  if(!S.user){renderLogin();return;}
  if(S.loading){
    const app=d('','display:flex;flex-direction:column;min-height:100vh');
    app.appendChild(renderNavbar());
    const ld=d('loader'); ld.innerHTML=`<div class="spin"></div>&ensp;Loading…`; app.appendChild(ld);
    root.appendChild(app); return;
  }

  const app=d('','display:flex;flex-direction:column;min-height:100vh');
  app.appendChild(renderNavbar());
  const ml=d('main');
  const isAdmin=S.user.role==='admin';

  let navItems, contentEl;
  if(isAdmin){
    navItems=[
      {id:'overview',label:'Overview',   icon:'<rect x="1" y="1" width="6" height="6" rx="1" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1" fill="currentColor" opacity=".5"/><rect x="1" y="9" width="6" height="6" rx="1" fill="currentColor" opacity=".5"/>'},
      {id:'marks',   label:'Class Marks',icon:'<path d="M1 4h14M1 8h14M1 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>'},
      {id:'classes', label:'All Classes',icon:'<rect x="1" y="3" width="14" height="10" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M5 14v2M11 14v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>'},
      {id:'reports', label:'Reports',    icon:'<path d="M3 2h10l3 3v13H3V2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M6 9h6M6 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>'},
    ];
    if(S.view==='overview') contentEl=ViewOverview();
    else if(S.view==='marks') contentEl=ViewMarks();
    else if(S.view==='classes') contentEl=ViewAllClasses();
    else contentEl=ViewReports();
  } else {
    navItems=[
      {id:'marks',  label:'Enter Marks',icon:'<path d="M1 4h14M1 8h14M1 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>'},
      {id:'summary',label:'Summary',    icon:'<path d="M2 12l5-5 4 4 5-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'},
    ];
    contentEl=S.view==='summary'?ViewSummary():ViewMarks();
  }

  const sb=e('aside',{class:'sidebar'});
  navItems.forEach(({id,label,icon})=>{
    const btn=e('button',{class:'nav-item'+(S.view===id?' active':'')});
    btn.innerHTML=`<svg width="15" height="15" viewBox="0 0 16 16" fill="none">${icon}</svg><span>${label}</span>`;
    btn.addEventListener('click',()=>{
      if(id==='reports'&&!S.reportPupils.length){S.view=id;S.reportSummary=null;render();loadReportPupils();}
      else{S.view=id;render();}
    }); sb.appendChild(btn);
  });

  ml.appendChild(sb); ml.appendChild(contentEl); app.appendChild(ml); root.appendChild(app);
}

// ══════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════
(async function boot(){
  const {data:{session}}=await db.auth.getSession();
  if(session){
    // 'users' table — not 'profiles' — matches actual hill-view-ps schema
    const {data:u}=await db.from('users').select('id,name,email,role,class_id').eq('id',session.user.id).single();
    if(u){S.user=u;S.view=u.role==='admin'?'overview':'marks';await loadAll();return;}
  }
  S.loading=false; render();
  db.auth.onAuthStateChange(ev=>{
    if(ev==='SIGNED_OUT'){Object.assign(S,{user:null,loading:false,classes:[],subjects:[],pupils:[],marksMap:{},classPerf:[],submissions:[],selClass:null,pending:{},reportPupils:[],reportSelId:null,reportSummary:null,reportSubjects:[]});render();}
  });
})();
</script>
