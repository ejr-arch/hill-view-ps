<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hill View Primary School — Reports</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1a6b3c;--gl:#e8f5ee;--gm:#0f4a2a;--gx:#c8f0d8;
  --bg:#f3f5f3;--surface:#fff;--border:#dde6dd;
  --text:#1a1f1a;--muted:#6b7b6b;--danger:#c0392b;--warn:#f39c12;
  --r:8px;--rl:12px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;min-height:100vh}
.navbar{background:var(--g);color:#fff;display:flex;align-items:center;gap:12px;padding:0 20px;height:52px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.nav-brand{font-weight:700;font-size:15px;flex:1;letter-spacing:-.01em}
.nav-user{font-size:12px;opacity:.9}
.badge-role{font-size:11px;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.btn-signout{background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 14px;border-radius:var(--r);cursor:pointer;font-size:12px;transition:background .2s}
.btn-signout:hover{background:rgba(255,255,255,.28)}
.main{display:flex;flex:1;min-height:0}
.sidebar{width:196px;background:var(--surface);border-right:1px solid var(--border);padding:10px 0;flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:9px;width:100%;padding:10px 18px;border:none;border-left:3px solid transparent;background:transparent;color:var(--muted);font-size:13px;cursor:pointer;text-align:left;transition:all .15s}
.nav-item:hover{background:var(--gl);color:var(--g)}
.nav-item.active{border-left-color:var(--g);background:var(--gl);color:var(--g);font-weight:600}
.content{flex:1;overflow-y:auto;padding:24px}
/* ── INPUTS ── */
input,select,textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;color:var(--text);background:var(--surface);outline:none;transition:border .15s;font-family:inherit}
input:focus,select:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(26,107,60,.1)}
input[type=number]{width:62px;text-align:center;padding:4px 5px;font-size:13px}
input.inline-num{width:62px;text-align:center;padding:4px 5px;font-size:13px}
/* ── BUTTONS ── */
.btn{padding:8px 18px;border-radius:var(--r);border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--g);color:#fff}.btn-primary:hover{background:var(--gm)}.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--g);color:var(--g)}.btn-ghost:hover{background:var(--gl)}
.btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger)}.btn-danger:hover{background:#fde0e0}
.btn-sm{padding:4px 12px;font-size:12px}
/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px}
.mc-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.mc{background:var(--gl);border-radius:var(--r);padding:16px;text-align:center}
.mc-val{font-size:26px;font-weight:700;color:var(--g)}
.mc-lbl{font-size:12px;color:var(--muted);margin-top:3px}
/* ── TABLES ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:8px 10px;background:var(--bg);font-weight:600;color:var(--muted);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;font-size:12px}
tbody td{padding:7px 10px;border-bottom:1px solid #f0f4f0;vertical-align:middle}
tbody tr:hover td{background:#fafcfa}
.sticky-col{position:sticky;left:0;background:var(--surface);z-index:1;font-weight:500}
thead .sticky-col{background:var(--bg)}
/* ── SCORE BADGES ── */
.sb{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:500}
.sb-a{background:#d1f0dc;color:#0a4f24}.sb-b{background:#d0e8ff;color:#0a3a6b}
.sb-c{background:#fff3cd;color:#7a5300}.sb-f{background:#fde0e0;color:#7a1111}
.pb{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:700}
.pb-1{background:#fff0a0;color:#7a5300}.pb-2{background:#f0f0f0;color:#555}.pb-n{background:#f0f0f0;color:var(--muted)}
.grade-b{display:inline-block;padding:3px 14px;border-radius:20px;font-size:13px;font-weight:700}
/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:32px;width:380px}
.login-logo{width:54px;height:54px;background:var(--g);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.login-h1{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.err-box{font-size:12px;color:var(--danger);padding:9px 12px;background:#fde0e0;border-radius:var(--r);margin-bottom:12px;white-space:pre-line;line-height:1.6}

/* ── MISC ── */
.page-h{font-size:20px;font-weight:700;color:var(--g);margin-bottom:20px}
.section-h{font-size:15px;font-weight:600;color:var(--muted);margin-bottom:14px}
.pill{font-size:12px;background:var(--gl);color:var(--g);padding:3px 12px;border-radius:20px;font-weight:600;display:inline-block}
.pill-grey{background:#f0f0f0;color:var(--muted)}
.hdr-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.save-toast{position:fixed;bottom:24px;right:24px;background:var(--g);color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999}
.save-toast.show{opacity:1}
.save-toast.ok{background:var(--g);color:#fff}
.save-toast.err{background:var(--danger);color:#fff}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--g);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.loader{display:flex;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--muted);padding:60px}
.two-col{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
.empty{padding:24px;text-align:center;color:var(--muted);font-size:13px}
.msg-ok{font-size:12px;color:#0a4f24;background:#d1f0dc;padding:7px 12px;border-radius:var(--r)}
.msg-err{font-size:12px;color:var(--danger);background:#fde0e0;padding:7px 12px;border-radius:var(--r)}
.inline-form{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.inline-form input{flex:1;min-width:180px}
.marks-actions{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.changed-dot{width:7px;height:7px;border-radius:50%;background:var(--warn);display:inline-block;margin-left:4px;vertical-align:middle}
/* ── PUPIL/TEACHER MANAGEMENT ── */
.avatar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px;margin-bottom:16px}
.avatar-card{text-align:center;border:1px solid var(--border);border-radius:var(--r);padding:10px;cursor:pointer;transition:all .15s;background:var(--surface)}
.avatar-card:hover{border-color:var(--g);box-shadow:0 2px 8px rgba(26,107,60,.12)}
.avatar-card.selected{border-color:var(--g);border-width:2px;background:var(--gl)}
.avatar-img{width:64px;height:64px;border-radius:50%;object-fit:cover;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--muted);margin:0 auto 6px;overflow:hidden}
.avatar-img img{width:100%;height:100%;object-fit:cover}
.avatar-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;margin:0 auto}
.upload-zone{border:2px dashed var(--border);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;transition:all .15s}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--g);background:var(--gl)}
.upload-zone input{display:none}
.upload-hint{font-size:12px;color:var(--muted)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-full{grid-column:1/-1}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select{width:100%}
.action-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.teach-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:14px}
.teach-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--g);flex-shrink:0;overflow:hidden}
.teach-avatar img{width:100%;height:100%;object-fit:cover}
.teach-info{flex:1}
.teach-name{font-size:15px;font-weight:700}
.teach-meta{font-size:12px;color:var(--muted);margin-top:2px}
.teach-class{font-size:12px;color:var(--g);font-weight:600}
.teach-actions{display:flex;gap:8px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-box{background:var(--surface);border-radius:var(--rl);padding:24px;width:440px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-h{font-size:17px;font-weight:700;margin-bottom:16px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
/* report print */
@media print{
  .no-print{display:none!important}
  .sidebar,.navbar{display:none!important}
  .content{padding:0}
  .report-card{max-width:none}
}
/* Submission status */
.sub-bar{height:8px;border-radius:20px;background:#e8e8e8;overflow:hidden;margin-top:4px}
.sub-fill{height:100%;border-radius:20px;background:var(--g);transition:width .4s}
/* Report card (in-page) */
.report-card{background:transparent;border:none;padding:0;max-width:none}
.report-preview-wrap{background:#dfe4df;border:1px solid var(--border);border-radius:var(--rl);padding:14px;overflow:auto}
.report-preview-sheet{width:210mm;min-height:297mm;margin:0 auto;background:#fff;box-shadow:0 10px 28px rgba(0,0,0,.08)}
/* ── EXCEL TABLE ── */
.excel-wrap{overflow-x:auto;border:1px solid #c8d8c8;border-radius:var(--r)}
.excel-tbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:auto}
.excel-tbl thead th{padding:7px 10px;background:#e8f0e8;font-weight:600;color:#2d4a2d;text-align:center;border-right:1px solid #c8d8c8;border-bottom:2px solid #9fbe9f;white-space:nowrap;font-size:12px;position:sticky;top:0;z-index:2}
.excel-tbl thead th.name-col{text-align:left;position:sticky;left:0;z-index:3;background:#d8ead8;min-width:160px}
.excel-tbl tbody td{padding:0;border-right:1px solid #dde8dd;border-bottom:1px solid #dde8dd;vertical-align:middle}
.excel-tbl tbody td.name-col{padding:6px 10px;font-weight:500;position:sticky;left:0;background:#f5faf5;z-index:1;border-right:2px solid #9fbe9f;white-space:nowrap}
.excel-tbl tbody tr:hover td{background:#f0f8f0}.excel-tbl tbody tr:hover td.name-col{background:#eaf4ea}
.excel-tbl tbody td.stat-col{padding:6px 8px;text-align:center;background:#f5faf5;border-right:1px solid #c8d8c8;font-weight:600;font-size:13px;white-space:nowrap}
.excel-tbl tbody td.act-col{padding:4px 8px;text-align:center;background:#f5faf5;border-right:none;white-space:nowrap}
.xcel-inp{width:58px;border:none;border-radius:0;padding:5px 4px;text-align:center;font-size:13px;background:transparent;color:var(--text);outline:none;display:block;margin:0 auto}
.xcel-inp:focus{background:#fffde7;box-shadow:inset 0 0 0 2px var(--warn);border-radius:3px}
.xcel-inp.changed{background:#fffbf0;color:#7a5300}
.excel-tbl tbody td.input-cell{padding:1px;text-align:center}
.excel-tbl tbody td.input-cell:focus-within{background:#fffde7;outline:2px solid var(--warn);outline-offset:-2px;z-index:2;position:relative}
/* add-pupil panel */
.add-pupil-panel{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--gl);border-top:2px dashed #9fbe9f;border-radius:0 0 var(--r) var(--r)}
.add-pupil-panel input{max-width:240px;padding:7px 11px;font-size:13px}
/* generate all */
.gen-all-btn{background:var(--g);color:#fff;border:none;padding:9px 20px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .15s}
.gen-all-btn:hover{background:var(--gm)}.gen-all-btn:disabled{opacity:.5;cursor:not-allowed}
.gen-progress{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
/* responsive */
@media(max-width:900px){.two-col{grid-template-columns:1fr}.mc-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.sidebar{width:44px}.nav-item span{display:none}.content{padding:14px}}
@media(max-width:490px){
  .mc-grid{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}
  .inline-form{flex-direction:column}
  .inline-form input,.inline-form select{flex:1;min-width:100%}
  .excel-wrap{font-size:11px}
  .xcel-inp{width:40px;padding:3px 2px;font-size:11px}
}
</style>

<body>
<div id="app"></div>
<div class="save-toast" id="toast">✓ Marks saved</div>

<script>
// ══════════════════════════════════════════════════
//  CONFIG — matches hill-view-ps Supabase project
// ══════════════════════════════════════════════════
const SUPA_URL = 'https://gtguutliwmhntuigcqta.supabase.co';
const SUPA_KEY = 'sb_publishable_32CnYot-3Kn2ysRljL9-zQ_G5r_QqLI';
const CLOUDINARY = {
  cloudName: 'dkh8e8upn',
  apiKey: '666746752822281',
  apiSecret: 'Qg5lWT8QKPmlmHXJ-i4cYwUcvBY'
};
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

// ══════════════════════════════════════════════════
//  SCHEMA KNOWLEDGE (matches seed.sql exactly)
//  Subject levels: 'nursery' | 'p1-p3' | 'p4-p7'
//  Class→level:  KG* → nursery, P1/P2/P3 → p1-p3, P4+ → p4-p7
//  P7 grade: class name starts with 'P7'
// ══════════════════════════════════════════════════
const resolveLevel = name => {
  if (name.startsWith('KG'))  return 'nursery';
  if (/^P[123]/.test(name))   return 'p1-p3';
  return 'p4-p7';
};
const isP7Class = name => /^P7/.test(name);

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
const S = {
  user: null,          // from users table
  view: 'overview',
  // data
  classes: [], subjects: [], pupils: [], marksMap: {},
  // admin analytics (from views)
  classPerf: [], submissions: [],
  // teacher
  selClass: null,      // admin class selector
  teacherClassIds: [], // teacher's assigned classes
  pending: {},         // `${pupil_id}::${subject_id}` → score (unsaved)
  saving: false,
  saveMsg: null,
  // report page
  reportPupils: [],
  reportSelId: null,
  reportSummary: null,
  reportSubjects: [],
  // pupil management
  pupilsList: [],
  selPupilClass: null,
  pupilSearch: '',
  editingPupil: null,
  // teacher management
  teachersList: [],
  teacherSearch: '',
  editingTeacher: null,
  // ui
  loading: true,
  chartInst: null,
  toastTimer: null,
};

// ══════════════════════════════════════════════════
//  CALC (client-side live recalc from pending edits)
// ══════════════════════════════════════════════════
const toAgg    = s => s>=90?1:s>=80?2:s>=70?3:s>=60?4:s>=50?5:s>=40?6:s>=30?7:8;
const pleGrade = t => t===4?'D1':t<=6?'D2':t<=8?'C3':t<=10?'C4':t<=12?'P5':t<=14?'P6':t<=16?'P7':'F9';
const gradeStyle = g => {
  if(['D1','D2'].includes(g)) return'background:#d1f0dc;color:#0a4f24';
  if(['C3','C4','C5','C6'].includes(g)) return'background:#d0e8ff;color:#0a3a6b';
  if(['P5','P6','P7','P8'].includes(g)) return'background:#fff3cd;color:#7a5300';
  return'background:#fde0e0;color:#7a1111';
};
const scoreClass = v => v>=80?'sb-a':v>=60?'sb-b':v>=40?'sb-c':'sb-f';
const scoreLabel = v => v>=80?'Excellent':v>=60?'Good':v>=40?'Average':'Needs Improvement';

const markKey = (pid, sid) => `${pid}::${sid}`;
const getScore = (pid, sid) => {
  const k = markKey(pid, sid);
  return S.pending[k] !== undefined ? S.pending[k] : (S.marksMap[k] ?? 0);
};

function classSubs(classId) {
  const cls = S.classes.find(c=>c.id===classId); if(!cls) return [];
  return S.subjects.filter(s=>s.level===resolveLevel(cls.name));
}

function rankPupils(classId) {
  const subs = classSubs(classId);
  return S.pupils.filter(p=>p.class_id===classId)
    .map(p=>{
      const scores = subs.map(s=>getScore(p.id,s.id));
      const total  = scores.reduce((a,b)=>a+b,0);
      const avg    = subs.length?total/subs.length:0;
      return{...p,scores,total,avg};
    })
    .sort((a,b)=>b.avg-a.avg)
    .map((p,i)=>({...p,pos:i+1}));
}

function pleCalc(pupilId, classId) {
  const subs = classSubs(classId); // p4-p7 level subs
  const aggs = subs.map(s=>({s,sc:getScore(pupilId,s.id),ag:toAgg(getScore(pupilId,s.id))}));
  const best4= [...aggs].sort((a,b)=>a.ag-b.ag).slice(0,4);
  const tot  = best4.reduce((s,a)=>s+a.ag,0);
  return{aggs,best4,tot,grade:pleGrade(tot)};
}

// ══════════════════════════════════════════════════
//  DATA LOADING
// ══════════════════════════════════════════════════
async function loadAll() {
  S.loading=true; render();

  // Core tables
  const [clsR,subR,pupR] = await Promise.all([
    db.from('classes').select('id,name').order('name'),
    db.from('subjects').select('id,name,level').order('name'),
    db.from('pupils').select('id,name,class_id').order('name'),
  ]);
  S.classes  = clsR.data  || [];
  S.subjects = subR.data  || [];
  
  // Load teacher classes FIRST (for filtering pupils)
  S.teacherClassIds = [];
  if (S.user.role === 'teacher') {
    const {data: tcData, error: tcErr} = await db.from('teacher_classes').select('class_id').eq('teacher_id', S.user.id);
    if (tcErr) console.warn('Load teacher_classes error:', tcErr);
    S.teacherClassIds = (tcData || []).map(tc => tc.class_id);
    if (S.teacherClassIds.length === 0 && S.user.class_id) {
      S.teacherClassIds = [S.user.class_id];
    }
    console.log('Teacher class IDs loaded:', S.teacherClassIds);
  }
  
  // Filter pupils based on teacher classes
  if (S.user.role === 'teacher' && S.teacherClassIds.length > 0) {
    S.pupils = (pupR.data || []).filter(p => S.teacherClassIds.includes(p.class_id));
  } else {
    S.pupils = pupR.data || [];
  }

  // Marks
  S.marksMap = {};
  const pids = S.pupils.map(p=>p.id);
  if(pids.length) {
    for(let i=0;i<pids.length;i+=200) {
      const {data:mks} = await db.from('marks').select('pupil_id,subject_id,score,teacher_comment').in('pupil_id',pids.slice(i,i+200));
      (mks||[]).forEach(m=>{ S.marksMap[markKey(m.pupil_id,m.subject_id)]=m.score; });
    }
  }

  // Admin: load views
  if(S.user.role==='admin') {
    const [perfR,subStatusR] = await Promise.all([
      db.from('class_performance').select('class_id,class_name,average_score,best_pupil,weakest_pupil').order('class_name'),
      db.from('teacher_submission_status').select('teacher_name,class_name,subjects_entered,subject_count').order('class_name'),
    ]);
    S.classPerf   = perfR.data   || [];

async function saveMarks() {
  const updates = Object.entries(S.pending).map(([k,score])=>{
    const [pupil_id,subject_id]=k.split('::');
    return{pupil_id,subject_id,score:parseInt(score)||0};
  });
  if(!updates.length){S.saveMsg='No changes to save.';render();return;}
  S.saving=true; S.saveMsg='Saving marks to database...'; render();
  const {data:{user}} = await db.auth.getUser();
  if(!user){S.saving=false;S.saveMsg='Error: Not logged in';render();flashToast('Error: Not logged in', 'err');return;}
  const payload = updates.map(u=>({...u,teacher_id:user.id}));
  try {
    const {error, data} = await db.from('marks').upsert(payload,{onConflict:'pupil_id,subject_id'}).select();
    S.saving=false;
    if(error){
      S.saveMsg='Error: '+error.message;
      flashToast('Error saving marks: ' + error.message, 'err');
      alert('Save failed: ' + error.message);
    } else {
      updates.forEach(u=>{ S.marksMap[markKey(u.pupil_id,u.subject_id)]=u.score; });
      S.pending={}; S.saveMsg=`Successfully saved ${updates.length} mark(s)!`;
      flashToast(`Successfully saved ${updates.length} mark(s)!`, 'ok');
      
      // Auto-generate teacher comments based on average
      await autoGenerateTeacherComments(updates);
    }
  } catch(e) {
    S.saving=false;
    S.saveMsg='Error: '+e.message;
    flashToast('Error: ' + e.message, 'err');
    alert('Save failed: ' + e.message);
  }
  render();
}

async function autoGenerateTeacherComments(savedUpdates) {
  const classId = S.selClass || S.classes[0]?.id;
  if (!classId) return;
  
  const classPupils = S.pupils.filter(p => p.class_id === classId);
  const classSubjects = S.subjects.filter(s => {
    const lvl = resolveLevel(classId).toLowerCase();
    return s.level?.toLowerCase() === lvl;
  });
  
  for (const pupil of classPupils) {
    let total = 0, count = 0;
    for (const subj of classSubjects) {
      const score = S.marksMap[markKey(pupil.id, subj.id)];
      if (score !== undefined) {
        total += score;
        count++;
      }
    }
    if (count === 0) continue;
    
    const avg = Math.round(total / count);
    let comment = '';
    if (avg >= 90) comment = 'Excellent performance! Keep it up.';
    else if (avg >= 80) comment = 'Very good work. Continue striving for excellence.';
    else if (avg >= 70) comment = 'Good effort. Aim higher next term.';
    else if (avg >= 60) comment = 'Fair performance. More effort needed.';
    else if (avg >= 50) comment = 'Pass. Work harder to improve.';
    else comment = 'Needs improvement. Attend extra lessons.';
    
    // Update comment in database for all subjects of this pupil
    for (const subj of classSubjects) {
      await db.from('marks').update({teacher_comment: comment}).eq('pupil_id', pupil.id).eq('subject_id', subj.id);
    }
  }
}

function setPending(pid, sid, val) {
  const v = Math.max(0,Math.min(100,parseInt(val)||0));
  S.pending[markKey(pid,sid)]=v;
  // live-update avg/pos/grade/remark in DOM without full re-render
  refreshLiveRow(pid, sid);
}

function refreshLiveRow(pid, sid) {
  const p = S.pupils.find(x=>x.id===pid); if(!p) return;
  const cid=p.class_id;
  const cls=S.classes.find(c=>c.id===cid);
  const p7=cls&&isP7Class(cls.name);

  // Update grade and remark
  const score=getScore(pid,sid);
  const grade=reportGrade(score);
  const remark=gradeRemark(grade);
  const gradeEl=document.getElementById(`grade-${pid}-${sid}`);
  if(gradeEl){gradeEl.innerHTML='';const gs=e('span',{class:'sb',style:gradeStyle(grade)});gs.textContent=grade;gradeEl.appendChild(gs);}
  const remarkEl=document.getElementById(`remark-${pid}-${sid}`);
  if(remarkEl){remarkEl.textContent=remark;}

  rankPupils(cid).forEach(rp=>{
    const goodColor=rp.avg>=60?'var(--g)':'var(--danger)';
    const te=document.getElementById(`tot-${rp.id}`); if(te){te.textContent=rp.total;te.style.color=goodColor;}
    const ae=document.getElementById(`avg-${rp.id}`); if(ae){ae.textContent=rp.avg.toFixed(1);ae.style.color=goodColor;}
    const pe=document.getElementById(`pos-${rp.id}`); if(pe){pe.innerHTML='';pe.appendChild(mkPosB(rp.pos));}
    if(p7){const ge=document.getElementById(`grade-${rp.id}`);if(ge){const pd=pleCalc(rp.id,cid);ge.innerHTML='';const s=e('span',{class:'grade-b',style:gradeStyle(pd.grade)});s.textContent=pd.grade;ge.appendChild(s);}}
  });
}

function flashToast(msg, type) {
  if(S.toastTimer) clearTimeout(S.toastTimer);
  const t=document.getElementById('toast');
  if(t){
    t.textContent=msg || 'Saved';
    t.className='save-toast show '+(type || '');
    S.toastTimer=setTimeout(()=>t.classList.remove('show'),3500);
  }
}

async function signIn(email,pw) {
  const {data,error} = await db.auth.signInWithPassword({email,password:pw});
  if(error) {
    if(error.message.includes('Invalid login')) return 'Wrong email or password.';
    if(error.message.includes('Email not confirmed')) return 'Email not confirmed — check your inbox or disable email confirmation in Supabase Auth settings.';

  const {data:u,error:ue} = await db.from('users').select('id,name,email,role,class_id,avatar').eq('id',data.user.id).single();

  await loadAll(); return null;
}

function scoreToDots(score) {
  if (score >= 90) return 5;
  if (score >= 75) return 4;
  if (score >= 60) return 3;
  if (score >= 45) return 2;
  if (score >= 25) return 1;

function renderDots(filled, total=5) {
  let out = '';
  for (let i = 0; i < total; i++) {

      out += `<span class="dot dot-filled"></span>`;
    } else {
      out += `<span class="dot dot-empty"></span>`;
    }
  }
  return out;
}

function escapeHtml(val) {
  return String(val ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}

function normalizeLabel(val) {
  return String(val || '').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
}

function mapSubjectScores(subjects) {
  const out = {};
  (subjects || []).forEach(s => { out[normalizeLabel(s.subject_name)] = Number(s.score); });
  return out;
}

function pickScore(subjectMap, aliases) {
  for (const alias of aliases) {
    const key = normalizeLabel(alias);
    if (subjectMap[key] != null) return subjectMap[key];
    const fuzzy = Object.entries(subjectMap).find(([k]) => k.includes(key) || key.includes(k));
    if (fuzzy) return fuzzy[1];
  }
  return null;
}

function scoreBand(score) {
  if (score == null || Number.isNaN(score)) return 'empty-dot';
  if (score >= 85) return 'excellent';
  if (score >= 70) return 'verygood';
  if (score >= 50) return 'good';
  return 'poor';
}

function nurseryCellScore(subjectMap, label) {
  const s = label.toLowerCase();
  if (s.includes('language') || s.includes('reading') || s.includes('writing') || s.includes('listening')) return pickScore(subjectMap, ['Language & Literacy', 'English Language']);
  if (s.includes('mathematics')) return pickScore(subjectMap, ['Mathematics', 'Mathematics & Numeracy']);
  if (s.includes('physical') || s.includes('health') || s.includes('cleanliness') || s.includes('toilet')) return pickScore(subjectMap, ['Physical Education', 'Physical & Health Education', 'Health']);
  if (s.includes('singing') || s.includes('drawing') || s.includes('shading') || s.includes('poems') || s.includes('rhythms')) return pickScore(subjectMap, ['Creative Arts']);
  if (s.includes('social') || s.includes('leadership') || s.includes('punctuality') || s.includes('attendance') || s.includes('sharing') || s.includes('relates')) return pickScore(subjectMap, ['Social Studies', 'Social & Emotional Development']);
  return null;
}

function reportGrade(score) {
  if (score >= 90) return 'D1';
  if (score >= 80) return 'D2';
  if (score >= 75) return 'C3';
  if (score >= 65) return 'C4';
  if (score >= 60) return 'C5';
  if (score >= 50) return 'C6';
  if (score >= 45) return 'P7';
  if (score >= 35) return 'P8';
  return 'F9';
}

function gradeRemark(grade) {
  const remarks = {
    'D1': 'Exceptional',
    'D2': 'Excellent',
    'C3': 'Very Good',
    'C4': 'Good',
    'C5': 'Fairly Good',
    'C6': 'Competent',
    'P7': 'Pass',
    'P8': 'Weak',
    'F9': 'Not Achieved'
  };
  return remarks[grade] || '';
}

function reportOutOf(className) {
  const cls = S.classes.find(c => c.name === className);
  return cls ? rankPupils(cls.id).length : '';
}

function buildPrimaryPdfCard(summary, subjects, progressiveScores) {

  (subjects || []).forEach(s => { if (s.teacher_comment) commentMap[normalizeLabel(s.subject_name)] = s.teacher_comment; });

  const rows = PRIMARY_REPORT_SUBJECTS.map((subject, idx) => {
    const score = pickScore(subjectMap, [subject]);
    const has = score != null && !Number.isNaN(score);
    const comment = escapeHtml(commentMap[normalizeLabel(subject)] || (has ? scoreLabel(score) : ''));
    return `<tr>
      <td class="center">${idx + 1}</td>
      <td>${escapeHtml(subject)}</td>
      <td class="center">${has ? score : ''}</td>
      <td class="center">${has ? 100 : ''}</td>
      <td class="center">${has ? reportGrade(score) : ''}</td>

function buildReportCardHtml(summary, subjects, progressiveScores) {
  const isNursery = summary.class_name && summary.class_name.startsWith('KG');
  return isNursery ? buildNurseryPdfCard(summary, subjects) : buildPrimaryPdfCard(summary, subjects, progressiveScores);
}

function openReportWindow(title, label, bodyHtml) {
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>${escapeHtml(title)}</title><style>${REPORT_DOC_CSS}</style></head><body><div class="toolbar noprint"><strong>${escapeHtml(label)}</strong><button onclick="window.print()">Print / Save PDF</button></div>${bodyHtml}</body></html>`);
  w.document.close();
}

function printReport(summary, subjects, progressiveScores) {
  openReportWindow(`Report - ${summary.pupil_name}`, `Hill View Report Card - ${summary.pupil_name}`, buildReportCardHtml(summary, subjects, progressiveScores));
}

async function generateAllReports(filterClass) {
  const pupils = filterClass ? S.pupils.filter(p=>p.class_id===filterClass) : S.pupils;
  if(!pupils.length){alert('No pupils to generate reports for.');return;}
  const pages = pupils.map(p => {
    const cls = S.classes.find(c=>c.id===p.class_id);
    const subs = classSubs(p.class_id);
    const ranked = rankPupils(p.class_id);
    const rp = ranked.find(r=>r.id===p.id)||{pos:'-',total:0,avg:0};
    const isP7 = cls && isP7Class(cls.name);
    const summary = {
      pupil_name: p.name,
      class_name: cls?.name || '',
      total_score: rp.total,
      average_score: rp.avg,
      position: rp.pos,
      uneb_grade: isP7 ? pleCalc(p.id,p.class_id).grade : null
    };
    return buildReportCardHtml(summary, subs.map(s=>({subject_name:s.name,score:getScore(p.id,s.id)})));
  });
  openReportWindow('All Reports - Hill View', `Hill View - All Reports (${pupils.length} pupils)`, pages.join(''));
}


function e(tag,attrs,...kids){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='class')el.className=v;
    else if(k==='style')el.style.cssText=v;
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  kids.flat().forEach(c=>{if(c!=null)el.append(typeof c==='string'?c:c);});
  return el;
}
const d=(cls,st,...ch)=>e('div',{class:cls||'',style:st||''},...ch);
const mkSB  = v=>{const s=e('span',{class:`sb ${scoreClass(v)}`});s.textContent=v;return s;};
const mkPosB= p=>{const s=e('span',{class:`pb ${p===1?'pb-1':p<=3?'pb-2':'pb-n'}`});s.textContent=`#${p}`;return s;};

// ══════════════════════════════════════════════════
//  EXCEL MARKS TABLE
//  readOnly=false → editable inputs with live avg/pos
//  readOnly=true  → badges (summary view)
//  showAddPupil   → bottom-row add-pupil panel
// ══════════════════════════════════════════════════
function MarksTable(classId, readOnly, showAddPupil) {
  const subs   = classSubs(classId);
  const ranked = rankPupils(classId);
  const cls    = S.classes.find(c=>c.id===classId);
  const p7     = cls && isP7Class(cls.name);
  const canAdd  = showAddPupil !== false && !readOnly;

  if (!subs.length && !ranked.length) {
    const msg=d('empty'); msg.textContent='No pupils or subjects found for this class.'; return msg;
  }
  if (!subs.length) {
    const msg=d('empty'); msg.textContent='No subjects configured for this level.'; return msg;
  }

  // ── outer wrapper
  const outer = d('');

  // ── excel table
  const wrap = d('excel-wrap');
  const tbl  = e('table',{class:'excel-tbl'});

  // ── thead
  const thead = document.createElement('thead');
  const hr    = document.createElement('tr');
  const thN   = e('th',{class:'name-col'}); thN.textContent='Pupil Name'; hr.appendChild(thN);
  subs.forEach(s=>{
    const th=document.createElement('th');
    th.textContent = s.name.length>13 ? s.name.slice(0,11)+'…' : s.name;
    th.title = s.name; hr.appendChild(th);
    // Grade header
    const thG=document.createElement('th');
    thG.textContent='Grade';
    thG.style.cssText='width:55px;text-align:center';
    hr.appendChild(thG);
    // Remark header
    const thR=document.createElement('th');
    thR.textContent='Remark';
    thR.style.cssText='min-width:100px';
    hr.appendChild(thR);
  });
  const statCols = ['Total','Avg','Pos',...(p7?['Grade']:[]),'Report'];
  const colCount = 1 + (subs.length * 3) + statCols.length;
  statCols.forEach(h=>{
    const th=document.createElement('th');
    th.textContent=h;
    th.style.background='#d8ead8';
    hr.appendChild(th);
  });
  thead.appendChild(hr); tbl.appendChild(thead);

  // ── tbody
  const tbody = document.createElement('tbody');

  if (!ranked.length) {
    const tr=document.createElement('tr');
    const td=e('td',{colspan:String(colCount),style:'padding:20px;text-align:center;color:var(--muted);font-style:italic'});
    td.textContent='No pupils enrolled yet. Use the panel below to add the first pupil.';
    tr.appendChild(td); tbody.appendChild(tr);
  }

  ranked.forEach((p,rowIdx)=>{
    const tr=document.createElement('tr');

    // name
    const tdN=e('td',{class:'name-col'});
    const nameWrap=d('','display:flex;align-items:center;gap:6px');
    const rowNum=e('span',{style:'font-size:10px;color:var(--muted);min-width:16px;text-align:right'}); rowNum.textContent=rowIdx+1;
    const nm=e('span'); nm.textContent=p.name; nameWrap.appendChild(rowNum); nameWrap.appendChild(nm); tdN.appendChild(nameWrap); tr.appendChild(tdN);

    // score cells + comments
    subs.forEach(s=>{
      const td=e('td',{class:'input-cell'});
      const val=getScore(p.id,s.id);
      if(readOnly){
        td.style.cssText='padding:5px 6px;text-align:center';
        td.appendChild(mkSB(val));
      } else {
        const isPending = S.pending[markKey(p.id,s.id)]!==undefined;
        const inp=e('input',{
          type:'number',min:'0',max:'100',step:'1',value:val,
          class:'xcel-inp'+(isPending?' changed':''),
          title:`${p.name} — ${s.name}`
        });
        inp.addEventListener('focus',()=>inp.select());
        inp.addEventListener('input',ev=>{
          inp.classList.add('changed');
          setPending(p.id,s.id,ev.target.value);
        });
        inp.addEventListener('keydown',ev=>{
          if(ev.key==='Enter'||ev.key==='Tab'){
            ev.preventDefault();
            const allInps=[...document.querySelectorAll('.xcel-inp, .cmt-inp')];
            const idx=allInps.indexOf(inp);
            const next=allInps[idx+1]; if(next)next.focus();
          }
        });
        td.appendChild(inp);
      }
      tr.appendChild(td);

      // Grade cell
      const tdG=e('td',{class:'stat-col', id:`grade-${p.id}-${s.id}`});
      const score=getScore(p.id,s.id);
      const grade=reportGrade(score);
      const gs=e('span',{class:'sb',style:gradeStyle(grade)}); gs.textContent=grade; tdG.appendChild(gs);
      tr.appendChild(tdG);

      // Remark cell
      const tdR=e('td',{class:'stat-col', id:`remark-${p.id}-${s.id}`});
      tdR.style.cssText='font-size:11px;color:var(--muted);white-space:nowrap';
      const remark=gradeRemark(grade);
      tdR.textContent=remark;
      tr.appendChild(tdR);
    });

    // Total
    const tdTot=e('td',{class:'stat-col'});
    const totEl=e('span',{id:`tot-${p.id}`,style:`font-size:13px;font-weight:700;color:${p.avg>=60?'var(--g)':'var(--danger)'}`}); totEl.textContent=p.total; tdTot.appendChild(totEl); tr.appendChild(tdTot);

    // Avg
    const tdA=e('td',{class:'stat-col'});
    const avgEl=e('strong',{id:`avg-${p.id}`,style:`color:${p.avg>=60?'var(--g)':'var(--danger)'}`}); avgEl.textContent=p.avg.toFixed(1); tdA.appendChild(avgEl); tr.appendChild(tdA);

    // Pos
    const tdP=e('td',{id:`pos-${p.id}`,class:'stat-col'}); tdP.appendChild(mkPosB(p.pos)); tr.appendChild(tdP);

    // P7 grade
    if(p7){
      const tdG=e('td',{id:`grade-${p.id}`,class:'stat-col'});
      const pd=pleCalc(p.id,classId);
      const gs=e('span',{class:'grade-b',style:gradeStyle(pd.grade)}); gs.textContent=pd.grade; tdG.appendChild(gs); tr.appendChild(tdG);
    }

    // Report btn
    const tdB=e('td',{class:'act-col'});
    const btn=e('button',{class:'btn btn-ghost btn-sm'}); btn.textContent='PDF';
    btn.addEventListener('click',()=>{
      const sum={pupil_name:p.name,class_name:cls?.name||'',total_score:p.total,average_score:p.avg,position:p.pos,uneb_grade:p7?pleCalc(p.id,classId).grade:null};
      printReport(sum, subs.map(s=>({subject_name:s.name,score:getScore(p.id,s.id)})));
    }); tdB.appendChild(btn); tr.appendChild(tdB);

    tbody.appendChild(tr);
  });

  tbl.appendChild(tbody); wrap.appendChild(tbl); outer.appendChild(wrap);

  // ── Add-pupil panel (bottom of excel block)
  if(canAdd){
    const panel=d('add-pupil-panel');
    const icon=e('span',{style:'font-size:18px;flex-shrink:0'}); icon.textContent='＋';
    const nameIn=e('input',{type:'text',placeholder:'New pupil full name…',style:'flex:1;max-width:280px'});
    const addBtn=e('button',{class:'btn btn-primary btn-sm'}); addBtn.textContent='Add Pupil';
    const msg=e('span',{style:'font-size:12px;color:var(--muted)'});

    const doAdd=async()=>{
      const nm=nameIn.value.trim(); if(!nm){msg.textContent='Enter a name first.';return;}
      addBtn.disabled=true; addBtn.innerHTML='<span class="spin"></span>';
      const err=await addPupil(nm,classId);
      if(err){msg.textContent='Error: '+err;addBtn.disabled=false;addBtn.textContent='Add Pupil';}
      else{msg.textContent='';nameIn.value='';nameIn.focus();}
    };
    addBtn.addEventListener('click',doAdd);
    nameIn.addEventListener('keydown',ev=>{if(ev.key==='Enter')doAdd();});
    panel.appendChild(icon); panel.appendChild(nameIn); panel.appendChild(addBtn); panel.appendChild(msg);
    outer.appendChild(panel);
  }

  return outer;
}

async function uploadAvatar(file, prefix) {
  const folder = prefix === 'pupils' ? 'pupil_avatars' : 'teacher_avatars';
  const publicId = `${folder}_${Date.now()}`;
  
  const formData = new FormData();
  formData.append('file', file);
  formData.append('api_key', CLOUDINARY.apiKey);
  formData.append('public_id', publicId);
  formData.append('cloud_name', CLOUDINARY.cloudName);
  formData.append('folder', folder);
  formData.append('upload_preset', 'gh_hillview');
  formData.append('timestamp', Math.round(Date.now() / 1000).toString());
  
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY.cloudName}/image/upload`, {
    method: 'POST',
    body: formData
  });
  
  const data = await res.json();
  if (data.secure_url) {
    console.log('Cloudinary upload success:', data.secure_url);
    return data.secure_url;
  }
  console.error('Cloudinary upload failed:', data);
  flashToast('Upload failed. Check console for details.', 'err');
  return null;
}

async function getAvatarUrl(path) {
  if (!path) return null;
  try {
    const res = await fetch(path);
    if (!res.ok) return path;
    const blob = await res.blob();
    return URL.createObjectURL(blob);
  } catch {
    return path;
  }
}

  });

  fileInput.click();

}

function processAndUploadAvatar(file, entityId, prefix) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = async function() {
      const SIZE = 300;
      const canvas = document.createElement('canvas');
      canvas.width = SIZE; canvas.height = SIZE;
      const ctx = canvas.getContext('2d');
      const minDim = Math.min(img.width, img.height);
      const sx = (img.width - minDim) / 2;
      const sy = (img.height - minDim) / 2;
      ctx.drawImage(img, sx, sy, minDim, minDim, 0, 0, SIZE, SIZE);
      canvas.toBlob(async function(blob) {
        if (!blob) { flashToast('Image processing failed.', 'err'); return; }
        const croppedFile = new File([blob], file.name, {type: 'image/jpeg'});
        const url = await uploadAvatar(croppedFile, prefix);
        if (url) {
          if (prefix === 'pupils') {
            await db.from('pupils').update({avatar: url}).eq('id', entityId);
            const p = S.pupilsList.find(x => x.id === entityId);
            if (p) p.avatar = url;
            await loadPupilsList();
          } else {
            await db.from('users').update({avatar: url}).eq('id', entityId);
            const t = S.teachersList.find(x => x.id === entityId);
            if (t) t.avatar = url;
            await loadTeachersList();
          }
          flashToast('Avatar uploaded!', 'ok');
        } else {
          flashToast('Upload failed. Check bucket permissions.', 'err');
        }
      }, 'image/jpeg', 0.85);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function ViewTeachers() {
  const c = d('content');
  const h = e('h2', {class: 'page-h'}); h.textContent = 'Teacher Management'; c.appendChild(h);

  if (teachersLoading) {
    const ld = d('loader'); ld.innerHTML = '<div class="spin"></div>&ensp;Loading teachers…'; c.appendChild(ld);
    return c;
  }

  if (!S.teachersList.length) {
    const ld = d('loader'); ld.innerHTML = '<div class="spin"></div>&ensp;Loading teachers…'; c.appendChild(ld);
    loadTeachersList();
    return c;
  }

  const ab = d('action-bar');
  const addBtn = e('button', {class: 'btn btn-primary'}); addBtn.innerHTML = '+ Add Teacher';
  addBtn.addEventListener('click', () => openTeacherModal(null));
  ab.appendChild(addBtn);

  const searchIn = e('input', {type: 'text', placeholder: 'Search teachers…', style: 'width:180px'});
  if (S.teacherSearch) searchIn.value = S.teacherSearch;
  searchIn.addEventListener('input', () => { S.teacherSearch = searchIn.value.trim(); render(); });
  searchIn.addEventListener('keydown', ev => { if (ev.key === 'Enter') render(); });
  ab.appendChild(searchIn);

  const filtered = S.teachersList.filter(t => {
    if (S.teacherSearch) {
      const q = S.teacherSearch.toLowerCase();
      const cls = S.classes.find(cl => cl.id === t.class_id);
      const clsName = cls ? cls.name.toLowerCase() : '';
      if (!t.name.toLowerCase().includes(q) && !t.email.toLowerCase().includes(q) && !clsName.includes(q)) return false;
    }
    return true;
  });

  const statsEl = e('span', {style: 'font-size:12px;color:var(--muted)'});
  statsEl.textContent = `${filtered.length} of ${S.teachersList.length} teacher${S.teachersList.length !== 1 ? 's' : ''}`;
  ab.appendChild(statsEl);
  c.appendChild(ab);

  if (!filtered.length) {
    const msg = d('empty'); msg.textContent = S.teacherSearch ? `No teachers match "${S.teacherSearch}"` : 'No teachers found. Click "Add Teacher" to create one.';
    c.appendChild(msg);
    return c;
  }

  filtered.forEach(t => {
    const card = d('teach-card');
    const av = d('teach-avatar');
    av.style.cursor = 'pointer';
    av.title = 'Click to enlarge';
    if (t.avatar) {
      const avImg = e('img', {src: t.avatar, style: 'width:100%;height:100%;object-fit:cover', crossorigin: 'anonymous'});
      avImg.onerror = () => { av.textContent = initials(t.name || 'T'); };
      av.addEventListener('click', () => openAvatarLightbox(t.avatar, t.name));
      av.appendChild(avImg);
    } else {
      av.textContent = initials(t.name || 'T');
    }
    card.appendChild(av);

    const info = d('teach-info');
    const nm = e('div', {class: 'teach-name'}); nm.textContent = t.name || '—'; info.appendChild(nm);
    const meta = e('div', {class: 'teach-meta'});
    meta.innerHTML = `${t.email || ''} <span style="margin-left:8px" class="pill pill-grey">${t.role || 'teacher'}</span>`;
    info.appendChild(meta);
    if (t.class_id) {
      const cls = S.classes.find(cl => cl.id === t.class_id);
      const clEl = e('div', {class: 'teach-class'}); clEl.textContent = `Class: ${cls?.name || '—'}`; info.appendChild(clEl);
    }
    card.appendChild(info);

    const acts = d('teach-actions');
    const edBtn = e('button', {class: 'btn btn-ghost btn-sm'}); edBtn.textContent = 'Edit';
    edBtn.addEventListener('click', () => openTeacherModal(t));
    const avBtn = e('button', {class: 'btn btn-ghost btn-sm'});
    avBtn.textContent = '↑ Avatar';
    avBtn.addEventListener('click', () => triggerTeacherAvatarUpload(t.id));
    const delBtn = e('button', {class: 'btn btn-danger btn-sm'});
    delBtn.textContent = '✕'; delBtn.title = 'Delete teacher';
    delBtn.addEventListener('click', () => deleteTeacher(t));
    acts.appendChild(edBtn); acts.appendChild(avBtn); acts.appendChild(delBtn);
    card.appendChild(acts);
    c.appendChild(card);
  });

  return c;
}

function triggerTeacherAvatarUpload(teacherId) {
  const fileInput = document.createElement('input');
  fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.style.display = 'none';
  fileInput.addEventListener('change', ev => {
    if (!ev.target.files[0]) return;
    processAndUploadAvatar(ev.target.files[0], teacherId, 'teachers');
  });
  document.body.appendChild(fileInput);
  fileInput.click();
  setTimeout(() => fileInput.remove(), 5000);
}

async function openTeacherModal(teacher) {
  const isNew = !teacher;
  let existingClassIds = [];
  if (!isNew) {
    const {data: tcData} = await db.from('teacher_classes').select('class_id').eq('teacher_id', teacher.id);
    existingClassIds = (tcData || []).map(tc => tc.class_id);
    if (existingClassIds.length === 0 && teacher.class_id) {
      existingClassIds = [teacher.class_id];
    }
  }
  S.teacherClassIds = existingClassIds;
  
  const overlay = d('modal-overlay');
  const box = d('modal-box');
  const title = e('div', {class: 'modal-h'}); title.textContent = isNew ? 'Create New Teacher' : 'Edit Teacher';
  box.appendChild(title);

  const nameIn = e('input', {type: 'text', placeholder: 'Full name', id: 'tm-name'});
  if (!isNew) nameIn.value = teacher.name || '';
  const nameGroup = d('form-group');
  const nameLabel = e('label'); nameLabel.textContent = 'Full Name';
  nameGroup.appendChild(nameLabel); nameGroup.appendChild(nameIn); box.appendChild(nameGroup);

  const emailIn = e('input', {type: 'email', placeholder: 'email@example.com', id: 'tm-email'});
  if (!isNew) emailIn.value = teacher.email || '';
  const emailGroup = d('form-group');
  const emailLabel = e('label'); emailLabel.textContent = 'Email';
  emailGroup.appendChild(emailLabel); emailGroup.appendChild(emailIn); box.appendChild(emailGroup);

  const roleGroup = d('form-group');
  const roleLabel = e('label'); roleLabel.textContent = 'Role';
  const roleSel = e('select', {id: 'tm-role'});
  ['teacher', 'admin'].forEach(r => {
    const o = e('option', {value: r}); o.textContent = r.charAt(0).toUpperCase() + r.slice(1);
    if (!isNew && teacher.role === r) o.selected = true;
    roleSel.appendChild(o);
  });
  roleGroup.appendChild(roleLabel); roleGroup.appendChild(roleSel); box.appendChild(roleGroup);

  const clsGroup = d('form-group');
  const clsLabel = e('label'); clsLabel.textContent = 'Assigned Classes (Ctrl+Click for multiple)';
  const clsSel = e('select', {id: 'tm-class', multiple: true, style: 'height:120px'});
  S.classes.forEach(cl => {
    const o = e('option', {value: cl.id}); o.textContent = cl.name;
    if (!isNew && teacher.class_id === cl.id) o.selected = true;
    if (!isNew && S.teacherClassIds?.includes(cl.id)) o.selected = true;
    clsSel.appendChild(o);
  });
  clsGroup.appendChild(clsLabel); clsGroup.appendChild(clsSel); box.appendChild(clsGroup);

  const pwGroup = d('form-group');
  const pwLabel = e('label'); pwLabel.textContent = isNew ? 'Temporary Password' : 'Password (admin only)';
  const pwIn = e('input', {type: 'password', placeholder: '••••••••', id: 'tm-pw'});
  if (!isNew) pwIn.disabled = true;
  pwGroup.appendChild(pwLabel); pwGroup.appendChild(pwIn); box.appendChild(pwGroup);

  const foot = d('modal-foot');
  const cancelBtn = e('button', {class: 'btn btn-ghost'}); cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', () => overlay.remove());
  const saveBtn = e('button', {class: 'btn btn-primary'});
  saveBtn.textContent = isNew ? 'Create Teacher' : 'Save Changes';

  saveBtn.addEventListener('click', async () => {
    const name = nameIn.value.trim();
    const email = emailIn.value.trim();
    const role = roleSel.value;
    const selectedOptions = [...clsSel.selectedOptions].map(o => o.value);
    const classId = selectedOptions[0] || null; // First selected for users.class_id
    const assignedClassIds = selectedOptions; // All selected for teacher_classes
    const pw = pwIn.value;
    if (!name) { flashToast('Name is required', 'err'); return; }
    saveBtn.disabled = true; saveBtn.innerHTML = '<span class="spin"></span>';
    if (isNew) {
      if (!email || !pw) { flashToast('Email and password required', 'err'); saveBtn.disabled = false; saveBtn.textContent = 'Create Teacher'; return; }
      try {
        const {data: authUser, error: authErr} = await db.auth.signUp({email, password: pw, options: {data: {name, role, class_id: classId}}});
        if (authErr) { 
          if (authErr.message.includes('429') || authErr.message.includes('rate limit')) {
            flashToast('Rate limited. Wait a moment then try again.', 'err');
          } else {
            flashToast('Auth error: ' + authErr.message, 'err');
          }
          saveBtn.disabled = false; saveBtn.textContent = 'Create Teacher'; return; 
        }
        if (!authUser || !authUser.user) { flashToast('Signup failed. Enable confirmations in Supabase settings.', 'err'); saveBtn.disabled = false; saveBtn.textContent = 'Create Teacher'; return; }
        const newUser = authUser.user;
        await db.from('users').insert({id: newUser.id, name, email, role, class_id: classId});
        // Add to teacher_classes for all selected classes
        for (const cid of assignedClassIds) {
          try {
            const {error: insErr} = await db.from('teacher_classes').insert({teacher_id: newUser.id, class_id: cid});
            if (insErr) console.warn('Insert teacher_classes error:', insErr);
          } catch(e) { console.warn('Insert catch:', e); }
        }
        console.log('Created teacher with classes:', assignedClassIds);
        S.teachersList.push({id: newUser.id, name, email, role, class_id: classId});
        flashToast('Teacher invited! Check email to confirm.', 'ok');
      } catch (err) {
        flashToast('Signup unavailable. Create user in Supabase dashboard.', 'err');
        saveBtn.disabled = false; saveBtn.textContent = 'Create Teacher';
        return;
      }
    } else {
      const updates = {name, role, class_id: classId};
      if (email) updates.email = email;
      await db.from('users').update(updates).eq('id', teacher.id);
      // Update teacher_classes - delete existing and re-insert
      try {
        const {error: delErr} = await db.from('teacher_classes').delete().eq('teacher_id', teacher.id);
        if (delErr) console.warn('Delete teacher_classes error:', delErr);
        for (const cid of assignedClassIds) {
          try {
            const {error: insErr} = await db.from('teacher_classes').insert({teacher_id: teacher.id, class_id: cid});
            if (insErr) console.warn('Insert teacher_classes error:', insErr);
          } catch(e) { console.warn('Insert catch:', e); }
        }
      } catch(e) { console.warn('Teacher classes update catch:', e); }
      const idx = S.teachersList.findIndex(x => x.id === teacher.id);
      if (idx >= 0) S.teachersList[idx] = {...S.teachersList[idx], ...updates};
    }
    flashToast(isNew ? 'Teacher created!' : 'Teacher updated!', 'ok');
    overlay.remove();
    render();
  });

  foot.appendChild(cancelBtn); foot.appendChild(saveBtn); box.appendChild(foot);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  nameIn.focus();
}

async function deleteTeacher(teacher) {
  if (!confirm(`Remove teacher "${teacher.name}" from the system? (Auth account must be deleted manually in Supabase dashboard)`)) return;
  await db.from('users').delete().eq('id', teacher.id);
  S.teachersList = S.teachersList.filter(x => x.id !== teacher.id);
  flashToast('Teacher removed.', 'ok');
  render();
}

        S.reportSummary=null;
        loadReportPupils();
        render();
      } else {
        render();
      }
    }); sb.appendChild(btn);
  });

  ml.appendChild(sb); ml.appendChild(contentEl); app.appendChild(ml); root.appendChild(app);
}

// ══════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════
(async function boot(){
  const hash = window.location.hash;
  if (hash.includes('type=signup') || hash.includes('type=recovery')) {
    const params = new URLSearchParams(hash.slice(1));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const token = params.get('token');
    const email = params.get('email');
    if (accessToken && refreshToken) {
      await db.auth.setSession({access_token: accessToken, refresh_token: refreshToken});
      window.location.hash = '';
      renderPasswordSet();
      return;
    } else if (token && email) {
      await db.auth.setSession({access_token: token, refresh_token: token});
      window.location.hash = '';
      renderPasswordSet();
      return;
    }
  }
  const {data:{session}}=await db.auth.getSession();
  if(session){
    const {data:u}=await db.from('users').select('id,name,email,role,class_id,avatar').eq('id',session.user.id).single();
    if(u){S.user=u;S.view=u.role==='admin'?'overview':'marks';await loadAll();return;}
  }
  S.loading=false; render();
  db.auth.onAuthStateChange(ev=>{
    if(ev==='SIGNED_OUT'){unsubscribeAll();Object.assign(S,{user:null,loading:false,classes:[],subjects:[],pupils:[],marksMap:{},classPerf:[],submissions:[],selClass:null,teacherClassIds:[],selPupilClass:null,pending:{},saving:false,saveMsg:null,reportPupils:[],reportSelId:null,reportSummary:null,reportSubjects:[],pupilsList:[],teachersList:[]});render();}
  });
})();
</script>
