<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hill View Primary School — Report Card Generator</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* ═══════════════════════════════════════════════
   GLOBAL RESET & VARIABLES
═══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1a6b3c;--gl:#e8f5ee;--gm:#0f4a2a;
  --bg:#f3f5f3;--surface:#fff;--border:#dde6dd;
  --text:#1a1f1a;--muted:#6b7b6b;--danger:#c0392b;--warn:#e67e22;
  --r:6px;--rl:10px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
#app{display:flex;flex-direction:column;min-height:100vh}

/* ── NAVBAR ── */
.navbar{background:var(--g);color:#fff;display:flex;align-items:center;gap:12px;padding:0 22px;height:54px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.nav-brand{font-weight:700;font-size:15px;flex:1}
.nav-user{font-size:12px;opacity:.85}
.badge-role{font-size:11px;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.btn-signout{background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 14px;border-radius:var(--r);cursor:pointer;font-size:12px;transition:background .2s}
.btn-signout:hover{background:rgba(255,255,255,.28)}

/* ── LAYOUT ── */
.main{display:flex;flex:1;min-height:0}
.sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:14px 0;flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:9px;width:100%;padding:10px 18px;border:none;border-left:3px solid transparent;background:transparent;color:var(--muted);font-size:13px;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit}
.nav-item:hover{background:var(--gl);color:var(--g)}
.nav-item.active{border-left-color:var(--g);background:var(--gl);color:var(--g);font-weight:600}
.content{flex:1;overflow-y:auto;padding:28px}

/* ── INPUTS ── */
input,select,textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(26,107,60,.1)}

/* ── BUTTONS ── */
.btn{padding:8px 18px;border-radius:var(--r);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:7px;font-family:inherit}
.btn-primary{background:var(--g);color:#fff}.btn-primary:hover{background:var(--gm)}.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--g);color:var(--g)}.btn-ghost:hover{background:var(--gl)}
.btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger)}.btn-danger:hover{background:#fde0e0}
.btn-warn{background:var(--warn);color:#fff}.btn-warn:hover{opacity:.9}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:22px;margin-bottom:18px}
.card-title{font-size:15px;font-weight:700;color:var(--g);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.field{margin-bottom:0}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.field-full{grid-column:1/-1}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:34px;width:380px}
.login-logo{width:52px;height:52px;background:var(--g);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.login-h1{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px}
.err-box{font-size:12px;color:var(--danger);padding:9px 12px;background:#fde0e0;border-radius:var(--r);margin-bottom:12px;white-space:pre-line;line-height:1.6}
.login-field{margin-bottom:13px}
.login-field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}

/* ── MISC ── */
.page-h{font-size:20px;font-weight:700;color:var(--g);margin-bottom:6px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:22px}
.hdr-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.loader{display:flex;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--muted);padding:60px}
.loader-spin{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--g);border-radius:50%;animation:sp .7s linear infinite}
.save-toast{position:fixed;bottom:24px;right:24px;background:var(--g);color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999}
.save-toast.show{opacity:1}
.msg-ok{font-size:12px;color:#0a4f24;background:#d1f0dc;padding:8px 12px;border-radius:var(--r);margin-bottom:12px}
.msg-err{font-size:12px;color:var(--danger);background:#fde0e0;padding:8px 12px;border-radius:var(--r);margin-bottom:12px}
.tab-row{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:22px}
.tab{padding:10px 22px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit;transition:all .15s}
.tab:hover{color:var(--g)}
.tab.active{color:var(--g);border-bottom-color:var(--g);background:var(--gl)}

/* ── MARKS TABLE ── */
.marks-table{width:100%;border-collapse:collapse;font-size:13px}
.marks-table th{padding:8px 12px;background:var(--bg);color:var(--muted);font-weight:700;text-align:left;border-bottom:2px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.marks-table td{padding:8px 12px;border-bottom:1px solid #eef2ee;vertical-align:middle}
.marks-table input[type=number]{width:70px;text-align:center;padding:5px 6px}
.marks-table select{width:120px;padding:5px 8px}
.grade-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700}

/* ── PUPIL SELECTOR ── */
.pupil-list{max-height:320px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r)}
.pupil-item{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;cursor:pointer;border-bottom:1px solid #f0f4f0;font-size:13px;transition:background .12s}
.pupil-item:hover{background:var(--gl)}
.pupil-item.selected{background:var(--gl);color:var(--g);font-weight:600}
.pupil-item:last-child{border-bottom:none}

/* ── OVERVIEW METRICS ── */
.mc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.mc{background:var(--gl);border-radius:var(--r);padding:16px;text-align:center}
.mc-val{font-size:28px;font-weight:700;color:var(--g)}
.mc-lbl{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
.tbl-wrap{overflow-x:auto}
table.list-tbl{width:100%;border-collapse:collapse;font-size:13px}
table.list-tbl th{padding:8px 12px;background:var(--bg);color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border)}
table.list-tbl td{padding:8px 12px;border-bottom:1px solid #f0f4f0}

/* ════════════════════════════════════════════
   PRINT STYLES — Report Cards
════════════════════════════════════════════ */
@media print{
  body{background:#fff !important;font-size:12pt}
  .no-print,.navbar,.sidebar{display:none!important}
  .content{padding:0!important}
  .print-page{page-break-after:always;padding:0}
  .rc-wrap{box-shadow:none!important;border:none!important;margin:0!important;max-width:none!important;padding:0!important}
}

/* ── REPORT CARD PREVIEW WRAPPER ── */
.print-page{background:#fff;padding:20px}
.rc-wrap{background:#fff;max-width:780px;margin:0 auto;font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#000}

/* ─ SHARED HEADER ─ */
.rc-header{text-align:center;border-bottom:3px double #000;padding-bottom:8px;margin-bottom:10px}
.rc-school-name{font-size:17px;font-weight:900;letter-spacing:.04em;text-transform:uppercase}
.rc-motto{font-size:11px;font-style:italic;margin:2px 0}
.rc-tel{font-size:11px}
.rc-doc-title{font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;margin:8px 0 0;text-decoration:underline}

/* ─ STUDENT INFO ROW ─ */
.rc-info-row{display:flex;gap:0;border:1px solid #000;margin-bottom:6px}
.rc-info-cell{flex:1;padding:4px 8px;border-right:1px solid #000;font-size:11px}
.rc-info-cell:last-child{border-right:none}
.rc-info-label{font-weight:700;font-size:10px;display:inline}
.rc-info-val{border-bottom:1px solid #555;display:inline-block;min-width:90px;margin-left:3px;vertical-align:bottom}

/* ─ KEY SECTION (NURSERY) ─ */
.rc-key-box{border:1px solid #000;padding:5px 10px;margin-bottom:8px}
.rc-key-title{font-weight:900;font-size:11px;margin-bottom:4px;text-transform:uppercase}
.rc-key-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px 16px}
.rc-key-item{font-size:10px}

/* ─ POSITION ROW ─ */
.rc-pos-row{display:flex;gap:0;border:1px solid #000;border-bottom:none;margin-bottom:0}
.rc-pos-cell{flex:1;padding:4px 8px;border-right:1px solid #000;font-size:11px;font-weight:700;text-align:center;text-transform:uppercase}
.rc-pos-cell:last-child{border-right:none}
.rc-pos-val{border-bottom:1px solid #000;display:inline-block;min-width:50px;margin-left:6px;font-weight:normal}

/* ─ NURSERY ASSESSMENT GRID ─ */
.rc-assess-outer{border:1px solid #000;margin-bottom:8px}
.rc-assess-header{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:2px solid #000}
.rc-assess-col-hdr{padding:5px 8px;font-weight:900;font-size:11px;text-transform:uppercase;text-align:center;border-right:1px solid #000}
.rc-assess-col-hdr:last-child{border-right:none}
.rc-assess-body{display:grid;grid-template-columns:1fr 1fr 1fr}
.rc-assess-col{border-right:1px solid #000}
.rc-assess-col:last-child{border-right:none}
.rc-assess-item{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-bottom:1px solid #ccc;font-size:10px;min-height:22px}
.rc-assess-item:last-child{border-bottom:none}
.rc-assess-item-name{flex:1}
.rc-assess-score{border-bottom:1px solid #000;display:inline-block;min-width:40px;text-align:center;font-size:10px}

/* ─ COMMENT BOXES ─ */
.rc-comment-section{margin-bottom:6px}
.rc-comment-label{font-weight:700;font-size:11px;margin-bottom:3px}
.rc-comment-box{border:1px solid #000;min-height:38px;padding:4px 6px;font-size:10px;position:relative}
.rc-sig-line{border-top:1px solid #000;width:160px;margin-top:18px;font-size:9px;color:#333;display:inline-block}

/* ─ FOOTER INFO ROW ─ */
.rc-footer-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.rc-footer-item{font-size:10px;border-bottom:1px solid #aaa;padding-bottom:2px}
.rc-footer-label{font-weight:700}

/* ─ PRIMARY GRADING SCALE ─ */
.rc-grade-scale{border:1px solid #000;margin-bottom:8px;padding:4px 8px}
.rc-grade-scale-title{font-weight:900;font-size:10px;margin-bottom:4px;text-transform:uppercase}
.rc-grade-boxes{display:flex;gap:3px;flex-wrap:wrap}
.rc-grade-box{border:1px solid #000;padding:2px 5px;text-align:center;min-width:52px}
.rc-grade-box-code{font-weight:900;font-size:11px}
.rc-grade-box-range{font-size:8px;color:#333}
.rc-grade-box-label{font-size:7.5px;color:#555}

/* ─ PRIMARY SUBJECTS TABLE ─ */
.rc-subjects-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:11px}
.rc-subjects-table th{border:1px solid #000;padding:4px 6px;text-align:center;font-weight:900;font-size:10px;background:#f0f0f0;text-transform:uppercase}
.rc-subjects-table th.left{text-align:left}
.rc-subjects-table td{border:1px solid #000;padding:3px 6px;vertical-align:middle}
.rc-subjects-table td.center{text-align:center;font-weight:600}
.rc-subjects-table td.num{text-align:center;font-size:10px;color:#555}
.rc-subjects-table td.remarks{font-size:9px;color:#333}
.rc-subjects-table tr.total-row td{font-weight:900;background:#f0f0f0}

/* ─ SIGNATURE BLOCK ─ */
.rc-sig-block{margin-bottom:10px}
.rc-sig-block-label{font-weight:700;font-size:11px;margin-bottom:2px}
.rc-sig-block-box{border:1px solid #000;min-height:42px;padding:4px 8px;display:flex;flex-direction:column;justify-content:flex-end}
.rc-sig-block-inner{display:flex;align-items:flex-end;justify-content:space-between;font-size:10px;margin-top:10px}
.rc-sig-line-short{border-top:1px solid #000;min-width:140px;padding-top:2px;font-size:9px;text-align:center}

/* ─ PRINT GENERATOR PREVIEW AREA ─ */
#preview-area{display:none}
#preview-area.visible{display:block}
.preview-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
</style>
</head>
<body>
<div id="app"></div>
<div class="save-toast" id="toast">✓ Saved successfully</div>

<script>
// ══════════════════════════════════════════════════
// CONFIG — Supabase
// ══════════════════════════════════════════════════
const SUPA_URL = 'https://gtguutliwmhntuigcqta.supabase.co';
const SUPA_KEY = 'sb_publishable_32CnYot-3Kn2ysRljL9-zQ_G5r_QqLI';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

// ══════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════
const NURSERY_LEARNING_AREAS = [
  'Language Development','Mathematics','Reading','Writing',
  'Health','Shading & Drawing','Social Development'
];
const NURSERY_SKILLS = ['Singing','Listening','Physical Education','Leadership','Poems & Rhythms'];
const NURSERY_HABITS = ['Relates With Others','Cleanliness','Toilet Use','Punctuality','Attendance','Sharing'];

const PRIMARY_SUBJECTS = [
  'English Language','Mathematics','Science','Social Studies',
  'Religious Education','Local Language','Kiswahili',
  'Creative Arts','Physical Education','ICT / Computer Studies',
  'Agriculture','Home Economics'
];

const GRADE_SCALE = [
  {code:'D1',min:90,max:100,label:'Distinction'},
  {code:'D2',min:80,max:89, label:'Distinction'},
  {code:'C3',min:70,max:79, label:'Credit'},
  {code:'C4',min:65,max:69, label:'Credit'},
  {code:'C5',min:60,max:64, label:'Credit'},
  {code:'C6',min:55,max:59, label:'Credit'},
  {code:'P7',min:45,max:54, label:'Pass'},
  {code:'P8',min:40,max:44, label:'Pass'},
  {code:'F9',min:0, max:39, label:'Fail'},
];

function getGrade(score){
  if(score===''||score===null||isNaN(score)) return '';
  const s=parseInt(score);
  const g=GRADE_SCALE.find(g=>s>=g.min&&s<=g.max);
  return g?g.code:'F9';
}
function gradeColor(code){
  if(['D1','D2'].includes(code)) return'#0a4f24';
  if(['C3','C4','C5','C6'].includes(code)) return'#0a3a6b';
  if(['P7','P8'].includes(code)) return'#7a5300';
  return'#c0392b';
}
function gradeAgg(score){
  const s=parseInt(score);
  if(isNaN(s)||s===0) return '';
  if(s>=90)return 1;if(s>=80)return 2;if(s>=70)return 3;
  if(s>=65)return 4;if(s>=60)return 5;if(s>=55)return 6;
  if(s>=45)return 7;if(s>=40)return 8;return 9;
}

const resolveLevel=name=>{
  if(!name) return 'primary';
  if(/^KG/i.test(name)||/^nursery/i.test(name)) return 'nursery';
  return 'primary';
};

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
const S = {
  user:null, view:'generate', loading:true,
  classes:[], pupils:[], subjects:[], marksMap:{},
  // report generator state
  reportType:'nursery',   // 'nursery' | 'primary'
  selPupil:null,          // pupil obj
  // form fields (nursery)
  nur:{
    name:'',cls:'',date:'',position:'',outOf:'',term:'',
    learningAreas:   Object.fromEntries(NURSERY_LEARNING_AREAS.map(a=>[a,''])),
    skills:          Object.fromEntries(NURSERY_SKILLS.map(s=>[s,''])),
    habits:          Object.fromEntries(NURSERY_HABITS.map(h=>[h,''])),
    teacherComment:'', headComment:'',
    balance:'', nextFees:'', endedOn:'', nextBegins:''
  },
  // form fields (primary)
  pri:{
    name:'',cls:'',stream:'',term:'',year:new Date().getFullYear()+'',
    position:'',outOf:'',
    subjects: Object.fromEntries(PRIMARY_SUBJECTS.map(s=>[s,{score:'',outOf:'100',remarks:''}])),
    teacherName:'',teacherComment:'',
    headName:'',headComment:'',
    parentName:'',parentComment:''
  },
  toastTimer:null
};

// ══════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════
const e=(tag,attrs={})=>{const el=document.createElement(tag);Object.entries(attrs).forEach(([k,v])=>{if(k==='class')el.className=v;else if(k.startsWith('on'))el[k]=v;else el.setAttribute(k,v)});return el};
const d=(cls='',style='')=>{const el=document.createElement('div');if(cls)el.className=cls;if(style)el.style.cssText=style;return el};
const h=(tag,cls,html)=>{const el=document.createElement(tag);if(cls)el.className=cls;if(html)el.innerHTML=html;return el};
const inp=(attrs)=>{const el=e('input',attrs);return el};

function flashToast(msg='✓ Saved'){
  if(S.toastTimer)clearTimeout(S.toastTimer);
  const t=document.getElementById('toast');
  if(t){t.textContent=msg;t.classList.add('show');S.toastTimer=setTimeout(()=>t.classList.remove('show'),2400);}
}

// ══════════════════════════════════════════════════
// DATA LOADING
// ══════════════════════════════════════════════════
async function loadAll(){
  S.loading=true; render();
  const [clsR,subR,pupR]=await Promise.all([
    db.from('classes').select('id,name').order('name'),
    db.from('subjects').select('id,name,level').order('name'),
    db.from('pupils').select('id,name,class_id').order('name'),
  ]);
  S.classes=clsR.data||[];
  S.subjects=subR.data||[];
  S.pupils=pupR.data||[];
  S.marksMap={};
  const pids=S.pupils.map(p=>p.id);
  if(pids.length){
    for(let i=0;i<pids.length;i+=200){
      const {data:mks}=await db.from('marks').select('pupil_id,subject_id,score').in('pupil_id',pids.slice(i,i+200));
      (mks||[]).forEach(m=>{S.marksMap[`${m.pupil_id}::${m.subject_id}`]=m.score;});
    }
  }
  S.loading=false; render();
}

async function signIn(email,pw){
  const {data,error}=await db.auth.signInWithPassword({email,password:pw});
  if(error){
    if(error.message.includes('Invalid login'))return'Wrong email or password.';
    return'Auth error: '+error.message;
  }
  const {data:u,error:ue}=await db.from('users').select('id,name,email,role,class_id').eq('id',data.user.id).single();
  if(ue||!u)return'Auth OK but user record not found. Check database setup.';
  S.user=u; await loadAll(); return null;
}

async function signOut(){
  await db.auth.signOut();
  S.user=null;S.loading=false;render();
}

// ══════════════════════════════════════════════════
// AUTO-FILL FROM DB
// ══════════════════════════════════════════════════
function autofillPupil(pupil){
  S.selPupil=pupil;
  const cls=S.classes.find(c=>c.id===pupil.class_id);
  const clsName=cls?cls.name:'';
  const level=resolveLevel(clsName);
  S.reportType=level==='nursery'?'nursery':'primary';

  if(S.reportType==='nursery'){
    S.nur.name=pupil.name;
    S.nur.cls=clsName;
    // fill learning areas from marks
    const lvlSubs=S.subjects.filter(s=>s.level==='nursery');
    lvlSubs.forEach(sub=>{
      const score=S.marksMap[`${pupil.id}::${sub.id}`]??'';
      const key=NURSERY_LEARNING_AREAS.find(a=>a.toLowerCase()===sub.name.toLowerCase())||
                NURSERY_SKILLS.find(a=>a.toLowerCase()===sub.name.toLowerCase())||
                NURSERY_HABITS.find(a=>a.toLowerCase()===sub.name.toLowerCase());
      if(key){
        if(NURSERY_LEARNING_AREAS.includes(key)) S.nur.learningAreas[key]=score;
        else if(NURSERY_SKILLS.includes(key)) S.nur.skills[key]=score;
        else if(NURSERY_HABITS.includes(key)) S.nur.habits[key]=score;
      }
    });
  } else {
    S.pri.name=pupil.name;
    S.pri.cls=clsName;
    const lvlSubs=S.subjects.filter(s=>s.level!=='nursery');
    lvlSubs.forEach(sub=>{
      const score=S.marksMap[`${pupil.id}::${sub.id}`]??'';
      const key=PRIMARY_SUBJECTS.find(a=>a.toLowerCase()===sub.name.toLowerCase());
      if(key&&S.pri.subjects[key]) S.pri.subjects[key].score=score;
    });
  }
  render();
}

function ViewGenerate(){
  const wrap=d('');

  // Header
  const hdr=d('hdr-row');
  const ph=h('div','page-h','📋 Report Card Generator');
  const ps=h('div','page-sub','Fill in student details and marks, then generate a printable report card.');
  wrap.append(ph,ps);

  // Type tabs
  const tabRow=d('tab-row');
  ['nursery','primary'].forEach(t=>{
    const tb=e('button',{class:'tab'+(S.reportType===t?' active':'')});
    tb.textContent=t==='nursery'?'🌱 Nursery Section':'📚 Primary Section';
    tb.onclick=()=>{S.reportType=t;render();};
    tabRow.appendChild(tb);
  });
  wrap.appendChild(tabRow);

  // Pupil selector (from DB if loaded)
  if(S.pupils.length){
    const pc=d('card');
    pc.appendChild(h('div','card-title','Auto-fill from Database'));
    const ps2=h('p','',`<span style="font-size:12px;color:var(--muted)">Select a student to auto-fill their details and marks:</span>`);
    pc.appendChild(ps2);
    const pl=d('pupil-list','margin-top:10px');
    const filtered=S.pupils.filter(p=>{
      const cls=S.classes.find(c=>c.id===p.class_id);
      const lv=resolveLevel(cls?cls.name:'');
      return S.reportType==='nursery'?lv==='nursery':lv!=='nursery';
    });
    if(!filtered.length){
      pl.innerHTML=`<div style="padding:14px;color:var(--muted);font-size:12px">No ${S.reportType} students found in database.</div>`;
    } else {
      filtered.forEach(pupil=>{
        const cls=S.classes.find(c=>c.id===pupil.class_id);
        const item=d('pupil-item'+(S.selPupil&&S.selPupil.id===pupil.id?' selected':''));
        item.innerHTML=`<span>${pupil.name}</span><span style="font-size:11px;color:var(--muted)">${cls?cls.name:''}</span>`;
        item.onclick=()=>autofillPupil(pupil);
        pl.appendChild(item);
      });
    }
    pc.appendChild(pl);
    wrap.appendChild(pc);
  }

  // Form
  if(S.reportType==='nursery'){
    wrap.appendChild(buildNurseryForm());
  } else {
    wrap.appendChild(buildPrimaryForm());
  }

  return wrap;
}

// ── PRIMARY FORM ──
function buildPrimaryForm(){
  const wrap=d('');

  // Student details
  const sc=d('card');
  sc.appendChild(h('div','card-title','Student Details'));
  const g1=d('form-grid-3');
  [['Name','name'],['Class','cls'],['Stream','stream'],['Term','term'],['Year','year'],['Position','position'],['Out Of','outOf']].forEach(([lbl,key],i)=>{
    const f=d('field'+(lbl==='Name'?' field-full':''));
    f.appendChild(h('label','',lbl));
    const inp2=e('input',{type:'text',placeholder:lbl,value:S.pri[key]||''});
    inp2.oninput=ev=>{S.pri[key]=ev.target.value;};
    f.appendChild(inp2); g1.appendChild(f);
  });
  sc.appendChild(g1); wrap.appendChild(sc);

  // Marks table
  const mc=d('card');
  mc.appendChild(h('div','card-title','Subject Marks'));
  const tbl=e('table',{class:'marks-table'});
  const thead=e('thead');
  thead.innerHTML='<tr><th>#</th><th>Subject</th><th>Marks Scored</th><th>Out Of</th><th>Grade</th><th>Agg</th><th>Teacher\'s Remarks</th></tr>';
  tbl.appendChild(thead);
  const tbody=e('tbody');
  PRIMARY_SUBJECTS.forEach((sub,i)=>{
    const s=S.pri.subjects[sub]||{score:'',outOf:'100',remarks:''};
    const grade=getGrade(s.score);
    const agg=s.score!==''?gradeAgg(s.score):'';
    const tr=e('tr');
    tr.id=`row-${i}`;
    const gradeStyle=grade?`color:${gradeColor(grade)};font-weight:700`:'' ;
    tr.innerHTML=`
      <td style="color:var(--muted);font-size:11px;text-align:center">${i+1}</td>
      <td style="font-weight:500">${sub}</td>
      <td><input type="number" min="0" max="100" value="${s.score}" placeholder="0-100" style="width:70px;text-align:center;padding:5px 6px;font-size:13px" data-sub="${sub}" data-field="score"></td>
      <td><input type="number" min="0" max="100" value="${s.outOf||100}" style="width:60px;text-align:center;padding:5px 6px;font-size:13px" data-sub="${sub}" data-field="outOf"></td>
      <td id="grade-cell-${i}" style="${gradeStyle};text-align:center;font-size:13px">${grade}</td>
      <td id="agg-cell-${i}" style="text-align:center;font-size:13px;color:var(--muted)">${agg}</td>
      <td><input type="text" value="${s.remarks||''}" placeholder="Comment" data-sub="${sub}" data-field="remarks"></td>`;
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);

  // Live grade update
  tbl.addEventListener('input',ev=>{
    const t=ev.target;
    const sub=t.dataset.sub;
    const field=t.dataset.field;
    if(!sub||!field)return;
    if(!S.pri.subjects[sub])S.pri.subjects[sub]={score:'',outOf:'100',remarks:''};
    S.pri.subjects[sub][field]=t.value;
    if(field==='score'){
      const idx=PRIMARY_SUBJECTS.indexOf(sub);
      if(idx>=0){
        const gc=document.getElementById(`grade-cell-${idx}`);
        const ac2=document.getElementById(`agg-cell-${idx}`);
        const g=getGrade(t.value);
        const ag=t.value!==''?gradeAgg(t.value):'';
        if(gc){gc.textContent=g;gc.style.color=g?gradeColor(g):'';gc.style.fontWeight=g?'700':'';}
        if(ac2){ac2.textContent=ag;}
      }
    }
  });

  mc.appendChild(d('tbl-wrap')); mc.lastChild.appendChild(tbl);
  wrap.appendChild(mc);

  // Comments
  const cc=d('card');
  cc.appendChild(h('div','card-title','Comments & Signatures'));
  const cg=d('form-grid');
  [
    ['Class Teacher\'s Name','teacherName'],
    ['Class Teacher\'s Comment','teacherComment'],
    ['Head Teacher\'s Name','headName'],
    ['Head Teacher\'s Comment','headComment'],
    ['Parent / Guardian Name','parentName'],
    ['Parent / Guardian Comment','parentComment'],
  ].forEach(([lbl,key])=>{
    const isComment=lbl.includes('Comment');
    const f=d('field'+(isComment?' field-full':''));
    f.appendChild(h('label','',lbl));
    if(isComment){
      const ta=e('textarea',{rows:'2',placeholder:lbl});
      ta.value=S.pri[key]||'';
      ta.oninput=ev=>{S.pri[key]=ev.target.value;};
      f.appendChild(ta);
    } else {
      const i2=e('input',{type:'text',placeholder:lbl,value:S.pri[key]||''});
      i2.oninput=ev=>{S.pri[key]=ev.target.value;};
      f.appendChild(i2);
    }
    cg.appendChild(f);
  });
  cc.appendChild(cg); wrap.appendChild(cc);

  // Generate button
  const gb=e('button',{class:'btn btn-primary'});
  gb.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg> Generate & Print Report Card';
  gb.onclick=()=>openPrintWindow('primary');
  wrap.appendChild(gb);
  return wrap;
}

      const remarksEl=document.querySelector(`[data-sub="${sub}"][data-field="remarks"]`);
      if(!S.pri.subjects[sub])S.pri.subjects[sub]={score:'',outOf:'100',remarks:''};
      if(scoreEl)S.pri.subjects[sub].score=scoreEl.value;
      if(outOfEl)S.pri.subjects[sub].outOf=outOfEl.value;
      if(remarksEl)S.pri.subjects[sub].remarks=remarksEl.value;
    });
  }

  const rcHTML=type==='nursery'?buildNurseryRC(S.nur):buildPrimaryRC(S.pri);

// ══════════════════════════════════════════════════
// OVERVIEW VIEW
// ══════════════════════════════════════════════════
function ViewOverview(){
  const wrap=d('');
  wrap.appendChild(h('div','page-h','Dashboard'));
  wrap.appendChild(h('div','page-sub','Hill View Primary School — Report Management'));
  const mc=d('mc-grid');
  [
    ['Total Students',S.pupils.length],
    ['Classes',S.classes.length],
    ['Nursery Students',S.pupils.filter(p=>{const c=S.classes.find(x=>x.id===p.class_id);return c&&resolveLevel(c.name)==='nursery'}).length],
    ['Primary Students',S.pupils.filter(p=>{const c=S.classes.find(x=>x.id===p.class_id);return c&&resolveLevel(c.name)!=='nursery'}).length],
  ].forEach(([lbl,val])=>{
    const m=d('mc');
    m.innerHTML=`<div class="mc-val">${val}</div><div class="mc-lbl">${lbl}</div>`;
    mc.appendChild(m);
  });
  wrap.appendChild(mc);

  const tc=d('card');
  tc.appendChild(h('div','card-title','Classes'));
  const tw=d('tbl-wrap');
  const tbl=e('table',{class:'list-tbl'});
  tbl.innerHTML=`<thead><tr><th>Class</th><th>Level</th><th>Students</th></tr></thead>`;
  const tb=e('tbody');
  S.classes.forEach(cls=>{
    const count=S.pupils.filter(p=>p.class_id===cls.id).length;
    const lv=resolveLevel(cls.name);
    const tr=e('tr');
    tr.innerHTML=`<td><strong>${cls.name}</strong></td>
      <td><span style="font-size:11px;background:${lv==='nursery'?'#e8f5ee':'#e8f0ff'};color:${lv==='nursery'?'#1a6b3c':'#3a1a6b'};padding:2px 8px;border-radius:20px;font-weight:600">${lv}</span></td>
      <td>${count}</td>`;
    tb.appendChild(tr);
  });
  tbl.appendChild(tb); tw.appendChild(tbl); tc.appendChild(tw); wrap.appendChild(tc);
  return wrap;
}

// ══════════════════════════════════════════════════
// AUTH VIEWS
// ══════════════════════════════════════════════════
function renderLogin(errMsg){
  const root=document.getElementById('app'); root.innerHTML='';
  const wrap=d('login-wrap');
  const card=d('login-card');
  const logo=d('login-logo');
  logo.innerHTML=`<svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="2" y="10" width="20" height="12" rx="2" stroke="#fff" stroke-width="1.5"/><path d="M12 2L2 10h20L12 2z" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/><rect x="9" y="14" width="6" height="8" fill="rgba(255,255,255,.4)"/></svg>`;
  card.appendChild(logo);
  card.appendChild(h('h1','login-h1','Hill View Primary School'));
  card.appendChild(h('p','login-sub','Report Card Management System'));
  if(errMsg){const eb=d('err-box');eb.textContent=errMsg;card.appendChild(eb);}

  ['Email','Password'].forEach(lbl=>{
    const f=d('login-field');
    f.appendChild(h('label','',lbl));
    const i=e('input',{type:lbl==='Email'?'email':'password',id:'l'+lbl.toLowerCase(),placeholder:lbl==='Email'?'you@email.com':'••••••••',autocomplete:lbl==='Email'?'email':'current-password'});
    f.appendChild(i); card.appendChild(f);
  });

  const btn=e('button',{class:'btn btn-primary'});
  btn.style.cssText='width:100%;justify-content:center;margin-top:6px';
  btn.textContent='Sign In';

  const doSI=async()=>{
    if(location.protocol==='file:'){renderLogin('Cannot run from file://\nServe via HTTP:\n\npython3 -m http.server 3000\n\nthen open http://localhost:3000');return;}
    btn.disabled=true;btn.innerHTML='<span class="spin"></span> Signing in…';
    const err=await signIn(document.getElementById('lemail').value.trim(),document.getElementById('lpassword').value);
    if(err){btn.disabled=false;btn.textContent='Sign In';renderLogin(err);}
  };
  btn.onclick=doSI;
  document.getElementById('lpassword')&&(document.getElementById('lpassword').onkeydown=ev=>{if(ev.key==='Enter')doSI();});
  card.appendChild(btn);

  // Guest mode
  const gst=e('button',{class:'btn btn-ghost'});
  gst.style.cssText='width:100%;justify-content:center;margin-top:10px';
  gst.textContent='Continue as Guest (No Database)';
  gst.onclick=()=>{S.user={name:'Guest',role:'guest'};S.loading=false;render();};
  card.appendChild(gst);

  wrap.appendChild(card); root.appendChild(wrap);
  setTimeout(()=>{const em=document.getElementById('lemail');if(em)em.focus();},50);
}

// ══════════════════════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════════════════════
function render(){
  const root=document.getElementById('app'); root.innerHTML='';
  if(!S.user){renderLogin();return;}
  if(S.loading){
    root.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;gap:14px;color:var(--muted)"><div class="loader-spin"></div>Loading data…</div>`;
    return;
  }

  const app=d('','display:flex;flex-direction:column;min-height:100vh');

  // Navbar
  const nav=e('nav',{class:'navbar'});
  nav.innerHTML=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="2" y="10" width="20" height="12" rx="2" stroke="#fff" stroke-width="1.5"/><path d="M12 2L2 10h20L12 2z" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/><rect x="9" y="14" width="6" height="8" fill="rgba(255,255,255,.4)"/></svg>`;
  const nb=h('span','nav-brand','Hill View Primary School');
  nav.appendChild(nb);
  if(S.user.name!=='Guest'){
    nav.appendChild(h('span','nav-user',S.user.name));
    nav.appendChild(h('span','badge-role',S.user.role));
  }
  const lo=e('button',{class:'btn-signout'});
  lo.textContent=S.user.name==='Guest'?'Back to Login':'Sign Out';
  lo.onclick=async()=>{if(S.user.name==='Guest'){S.user=null;render();}else{await signOut();}};
  nav.appendChild(lo);
  app.appendChild(nav);

  const ml=d('main');

  // Sidebar
  const sb=e('aside',{class:'sidebar'});
  const navItems=[
    {id:'generate',label:'Generate Report',icon:'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z'},
  ];
  if(S.user.role!=='guest'){
    navItems.unshift({id:'overview',label:'Overview',icon:'M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z'});
  }
  navItems.forEach(({id,label,icon})=>{
    const btn=e('button',{class:'nav-item'+(S.view===id?' active':'')});
    btn.innerHTML=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="${icon}" stroke-linecap="round" stroke-linejoin="round"/></svg><span>${label}</span>`;
    btn.onclick=()=>{S.view=id;render();};
    sb.appendChild(btn);
  });
  ml.appendChild(sb);

  // Content
  const ct=d('content');
  if(S.view==='overview') ct.appendChild(ViewOverview());
  else ct.appendChild(ViewGenerate());

  ml.appendChild(ct);
  app.appendChild(ml);
  root.appendChild(app);
}

// ══════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════
(async function boot(){
  const {data:{session}}=await db.auth.getSession();
  if(session){
    const {data:u}=await db.from('users').select('id,name,email,role,class_id').eq('id',session.user.id).single();
    if(u){S.user=u;S.view='overview';await loadAll();return;}
  }
  S.loading=false; render();
  db.auth.onAuthStateChange(ev=>{
    if(ev==='SIGNED_OUT'){S.user=null;S.loading=false;render();}
  });
})();
</script>
