<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Hill View Primary School — Reports</title>
	<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>

<body>
	<div id="app"></div>
	<div class="save-toast" id="toast">✓ Marks saved</div>

	<script>
		// ══════════════════════════════════════════════════
		//  CONFIG — matches hill-view-ps Supabase project
		// ══════════════════════════════════════════════════
		const SUPA_URL = 'https://gtguutliwmhntuigcqta.supabase.co';
		const SUPA_KEY = 'sb_publishable_32CnYot-3Kn2ysRljL9-zQ_G5r_QqLI';
		const db = supabase.createClient(SUPA_URL, SUPA_KEY);

		// ══════════════════════════════════════════════════
		//  SCHEMA KNOWLEDGE (matches seed.sql exactly)
		//  Subject levels: 'nursery' | 'p1-p3' | 'p4-p7'
		//  Class→level:  KG* → nursery, P1/P2/P3 → p1-p3, P4+ → p4-p7
		//  P7 grade: class name starts with 'P7'
		// ══════════════════════════════════════════════════
		const resolveLevel = name => {
			if (name.startsWith('KG')) return 'nursery';
			if (/^P[123]/.test(name)) return 'p1-p3';
			return 'p4-p7';
		};
		const isP7Class = name => /^P7/.test(name);

		// ══════════════════════════════════════════════════
		//  STATE
		// ══════════════════════════════════════════════════
		const S = {
			user: null,          // from users table
			view: 'overview',
			// data
			classes: [], subjects: [], pupils: [], marksMap: {},
			// admin analytics (from views)
			classPerf: [], submissions: [],
			// teacher
			selClass: null,      // admin class selector
			pending: {},         // `${pupil_id}::${subject_id}` → score (unsaved)
			saving: false,
			saveMsg: null,
			// report page
			reportPupils: [],
			reportSelId: null,
			reportSummary: null,
			reportSubjects: [],
			// term settings (admin-controlled, used in all report prints)
			termSettings: {
				termLabel: 'Term 2, 2025',
				endDate: '',
				nextTermStart: '',
				settingsMsg: null,
			},
			// ui
			loading: true,
			chartInst: null,
			toastTimer: null,
		};

		// ══════════════════════════════════════════════════
		//  CALC (client-side live recalc from pending edits)
		// ══════════════════════════════════════════════════
		const toAgg = s => s >= 90 ? 1 : s >= 80 ? 2 : s >= 70 ? 3 : s >= 60 ? 4 : s >= 50 ? 5 : s >= 40 ? 6 : s >= 30 ? 7 : 8;
		const pleGrade = t => t === 4 ? 'D1' : t <= 6 ? 'D2' : t <= 8 ? 'C3' : t <= 10 ? 'C4' : t <= 12 ? 'P5' : t <= 14 ? 'P6' : t <= 16 ? 'P7' : 'F9';
		const gradeStyle = g => {
			if (['D1', 'D2'].includes(g)) return 'background:#d1f0dc;color:#0a4f24';
			if (['C3', 'C4'].includes(g)) return 'background:#d0e8ff;color:#0a3a6b';
			if (['P5', 'P6', 'P7'].includes(g)) return 'background:#fff3cd;color:#7a5300';
			return 'background:#fde0e0;color:#7a1111';
		};
		const scoreClass = v => v >= 80 ? 'sb-a' : v >= 60 ? 'sb-b' : v >= 40 ? 'sb-c' : 'sb-f';
		const scoreLabel = v => v >= 80 ? 'Excellent' : v >= 60 ? 'Good' : v >= 40 ? 'Average' : 'Needs Improvement';

		const markKey = (pid, sid) => `${pid}::${sid}`;
		const getScore = (pid, sid) => {
			const k = markKey(pid, sid);
			return S.pending[k] !== undefined ? S.pending[k] : (S.marksMap[k] ?? 0);
		};

		function classSubs(classId) {
			const cls = S.classes.find(c => c.id === classId); if (!cls) return [];
			return S.subjects.filter(s => s.level === resolveLevel(cls.name));
		}

		function rankPupils(classId) {
			const subs = classSubs(classId);
			return S.pupils.filter(p => p.class_id === classId)
				.map(p => {
					const scores = subs.map(s => getScore(p.id, s.id));
					const total = scores.reduce((a, b) => a + b, 0);
					const avg = subs.length ? total / subs.length : 0;
					return {...p, scores, total, avg};
				})
				.sort((a, b) => b.avg - a.avg)
				.map((p, i) => ({...p, pos: i + 1}));
		}

		function pleCalc(pupilId, classId) {
			const subs = classSubs(classId); // p4-p7 level subs
			const aggs = subs.map(s => ({s, sc: getScore(pupilId, s.id), ag: toAgg(getScore(pupilId, s.id))}));
			const best4 = [...aggs].sort((a, b) => a.ag - b.ag).slice(0, 4);
			const tot = best4.reduce((s, a) => s + a.ag, 0);
			return {aggs, best4, tot, grade: pleGrade(tot)};
		}

		// ══════════════════════════════════════════════════
		//  DATA LOADING
		// ══════════════════════════════════════════════════
		async function loadAll() {
			S.loading = true; render();

			// Load term settings early (local instant, then remote async)
			await loadTermSettingsRemote();

			// Core tables
			const [clsR, subR, pupR] = await Promise.all([
				db.from('classes').select('id,name').order('name'),
				db.from('subjects').select('id,name,level').order('name'),
				db.from('pupils').select('id,name,class_id').order('name'),  // RLS filters teachers
			]);
			S.classes = clsR.data || [];
			S.subjects = subR.data || [];
			S.pupils = pupR.data || [];

			// Marks
			S.marksMap = {};
			const pids = S.pupils.map(p => p.id);
			if (pids.length) {
				for (let i = 0; i < pids.length; i += 200) {
					const {data: mks} = await db.from('marks').select('pupil_id,subject_id,score').in('pupil_id', pids.slice(i, i + 200));
					(mks || []).forEach(m => {S.marksMap[markKey(m.pupil_id, m.subject_id)] = m.score;});
				}
			}

			// Admin: load views
			if (S.user.role === 'admin') {
				const [perfR, subStatusR] = await Promise.all([
					db.from('class_performance').select('class_id,class_name,average_score,best_pupil,weakest_pupil').order('class_name'),
					db.from('teacher_submission_status').select('teacher_name,class_name,subjects_entered,subject_count').order('class_name'),
				]);
				S.classPerf = perfR.data || [];
				S.submissions = subStatusR.data || [];
			}

			// Default selection
			if (!S.selClass) S.selClass = S.classes[0]?.id || null;

			S.loading = false; S.pending = {}; render();
		}

		async function loadReportPupils() {
			const {data} = await db.from('pupil_report_summary')
				.select('pupil_id,pupil_name,class_name').order('class_name').order('pupil_name');
			S.reportPupils = data || [];
			if (!S.reportSelId && S.reportPupils.length) S.reportSelId = S.reportPupils[0].pupil_id;
			if (S.reportSelId) await loadReportForPupil(S.reportSelId);
			else render();
		}

		async function loadReportForPupil(pupilId) {
			S.reportSelId = pupilId;
			const [sumR, subjR] = await Promise.all([
				db.from('pupil_report_summary').select('pupil_id,pupil_name,class_name,total_score,average_score,position,uneb_grade').eq('pupil_id', pupilId).single(),
				db.from('pupil_report_subjects').select('subject_name,score').eq('pupil_id', pupilId),
			]);
			S.reportSummary = sumR.data || null;
			S.reportSubjects = subjR.data || [];
			render();
		}

		// ══════════════════════════════════════════════════
		//  MARKS SAVE (batch — matches /api/teacher/marks)
		// ══════════════════════════════════════════════════
		async function saveMarks() {
			const updates = Object.entries(S.pending).map(([k, score]) => {
				const [pupil_id, subject_id] = k.split('::');
				return {pupil_id, subject_id, score: parseInt(score) || 0};
			});
			if (!updates.length) {S.saveMsg = 'No changes to save.'; render(); return;}
			S.saving = true; S.saveMsg = null; render();
			const {data: {user}} = await db.auth.getUser();
			const payload = updates.map(u => ({...u, teacher_id: user.id}));
			const {error} = await db.from('marks').upsert(payload, {onConflict: 'pupil_id,subject_id'});
			if (error) {S.saveMsg = 'Error: ' + error.message;}
			else {
				updates.forEach(u => {S.marksMap[markKey(u.pupil_id, u.subject_id)] = u.score;});
				S.pending = {}; S.saveMsg = 'Marks saved successfully.';
				flashToast();
			}
			S.saving = false; render();
		}

		async function addPupil(name, classId) {
			const {data, error} = await db.from('pupils').insert({name, class_id: classId}).select('id,name,class_id').single();
			if (error) return error.message;
			S.pupils = [...S.pupils, data];
			render(); return null;
		}

		function setPending(pid, sid, val) {
			const v = Math.max(0, Math.min(100, parseInt(val) || 0));
			S.pending[markKey(pid, sid)] = v;
			// live-update avg/pos in DOM without full re-render
			refreshLiveRow(pid, sid);
		}

		function refreshLiveRow(pid, sid) {
			const p = S.pupils.find(x => x.id === pid); if (!p) return;
			const cid = p.class_id;
			const cls = S.classes.find(c => c.id === cid);
			const p7 = cls && isP7Class(cls.name);
			rankPupils(cid).forEach(rp => {
				const ae = document.getElementById(`avg-${rp.id}`); if (ae) ae.textContent = rp.avg.toFixed(1);
				const pe = document.getElementById(`pos-${rp.id}`); if (pe) {pe.innerHTML = ''; pe.appendChild(mkPosB(rp.pos));}
				if (p7) {const ge = document.getElementById(`grade-${rp.id}`); if (ge) {const pd = pleCalc(rp.id, cid); ge.innerHTML = ''; const s = e('span', {class: 'grade-b', style: gradeStyle(pd.grade)}); s.textContent = pd.grade; ge.appendChild(s);} }
			});
		}

		function flashToast() {
			if (S.toastTimer) clearTimeout(S.toastTimer);
			const t = document.getElementById('toast'); if (t) {t.classList.add('show'); S.toastTimer = setTimeout(() => t.classList.remove('show'), 2200);}
		}

		// ══════════════════════════════════════════════════
		//  AUTH
		// ══════════════════════════════════════════════════
		async function signIn(email, pw) {
			const {data, error} = await db.auth.signInWithPassword({email, password: pw});
			if (error) return error.message;
			// Read from 'users' table (not 'profiles') — matches actual schema
			const {data: u, error: ue} = await db.from('users').select('id,name,email,role,class_id').eq('id', data.user.id).single();
			if (ue || !u) return 'Account found but no user record. Run mock_data.sql in Supabase first.';
			S.user = u; S.view = u.role === 'admin' ? 'overview' : 'marks';
			await loadAll(); return null;
		}

		async function signOut() {
			await db.auth.signOut();
			Object.assign(S, {user: null, view: 'overview', classes: [], subjects: [], pupils: [], marksMap: {}, classPerf: [], submissions: [], selClass: null, pending: {}, saving: false, saveMsg: null, reportPupils: [], reportSelId: null, reportSummary: null, reportSubjects: [], loading: false, chartInst: null});
			render();
		}

		// ══════════════════════════════════════════════════
		//  PRINT REPORT — routes to correct template
		// ══════════════════════════════════════════════════
		function printReport(summary, subjects) {
			const isNursery = resolveLevel(summary.class_name) === 'nursery';
			if (isNursery) printNurseryReport(summary, subjects);
			else printPrimaryReport(summary, subjects);
		}

		// ── Shared assets ─────────────────────────────────
		const LOGO_PATH = 'assets/logo.jpg';
		const SCHOOL_NAME = 'Hill View Primary School';
		const SCHOOL_MOTTO = '"Striving for Excellence"';
		const SCHOOL_TEL = 'Tel: —';

		// Live getters — always read from state so reports pick up admin changes immediately
		const getTermLabel = () => S.termSettings.termLabel || 'Term —';
		const getEndDate = () => S.termSettings.endDate || '—';
		const getNextTermStart = () => S.termSettings.nextTermStart || '—';

		// ── Term settings persistence (localStorage + Supabase app_settings table fallback) ──
		const SETTINGS_KEY = 'hillview_term_settings';

		function loadTermSettingsLocal() {
			try {
				const raw = localStorage.getItem(SETTINGS_KEY);
				if (raw) {
					const parsed = JSON.parse(raw);
					Object.assign(S.termSettings, parsed);
				}
			} catch (e) { }
		}

		async function saveTermSettings() {
			const payload = {
				termLabel: S.termSettings.termLabel,
				endDate: S.termSettings.endDate,
				nextTermStart: S.termSettings.nextTermStart,
			};
			// Always save locally first (instant)
			try {localStorage.setItem(SETTINGS_KEY, JSON.stringify(payload));} catch (e) { }
			// Also persist to Supabase app_settings table if it exists (graceful fail)
			try {
				await db.from('app_settings').upsert(
					{key: 'term', value: JSON.stringify(payload)},
					{onConflict: 'key'}
				);
			} catch (e) { }
			S.termSettings.settingsMsg = 'saved';
			render();
			setTimeout(() => {S.termSettings.settingsMsg = null; render();}, 2500);
		}

		async function loadTermSettingsRemote() {
			loadTermSettingsLocal(); // load local first for speed
			try {
				const {data} = await db.from('app_settings').select('value').eq('key', 'term').single();
				if (data?.value) {
					const parsed = JSON.parse(data.value);
					Object.assign(S.termSettings, parsed);
					// Keep local in sync
					try {localStorage.setItem(SETTINGS_KEY, JSON.stringify(parsed));} catch (e) { }
				}
			} catch (e) { } // table may not exist yet — silent fail
		}

		// Dot colour from nursery score (0-100 numeric)
		function nurseryDotColor(score) {
			if (score >= 85) return '#1a7a3c'; // green  = Excellent
			if (score >= 70) return '#1565c0'; // blue   = Very Good
			if (score >= 50) return '#f9a825'; // yellow = Good
			return '#c62828';                  // red    = Needs Improvement
		}
		function nurseryDotSvg(score) {
			const c = nurseryDotColor(score);
			return `<svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="10" fill="${c}"/></svg>`;
		}
		function nurseryLabel(score) {
			if (score >= 85) return 'Excellent';
			if (score >= 70) return 'Very Good';
			if (score >= 50) return 'Good';
			return 'Needs Improvement';
		}

		// Primary score colour
		function primaryScoreColor(score) {
			if (score >= 80) return '#0a4f24';
			if (score >= 60) return '#0a3a6b';
			if (score >= 40) return '#7a5300';
			return '#c0392b';
		}
		function primaryRemarks(score) {
			if (score >= 80) return 'Excellent';
			if (score >= 60) return 'Good';
			if (score >= 40) return 'Average';
			return 'Needs Improvement';
		}

		// ── NURSERY REPORT TEMPLATE ───────────────────────
		function printNurseryReport(summary, subjects) {
			const w = window.open('', '_blank');

			// ── Learning Areas come from DB (scored, show coloured dot) ──────────────
			// Skills and Habits are fixed lists — printed as EMPTY circles for teacher
			// to shade by hand based on observation.

			const SKILLS = [
				'Singing', 'Listening', 'Physical Education',
				'Leadership', 'Shading & Drawing', 'Poems & Rhythms'
			];
			const HABITS = [
				'Relates with Others', 'Cleanliness', 'Toilet Use',
				'Punctuality', 'Attendance', 'Sharing'
			];

			// Empty circle SVG — teacher shades by hand
			const emptyCircle = `<svg width="22" height="22" viewBox="0 0 22 22">
    <circle cx="11" cy="11" r="9" fill="none" stroke="#111" stroke-width="1.8"/>
  </svg>`;

			const maxRows = Math.max(subjects.length, SKILLS.length, HABITS.length);
			let tableRows = '';
			for (let i = 0; i < maxRows; i++) {
				const la = subjects[i];
				const sk = SKILLS[i] || '';
				const hb = HABITS[i] || '';
				// Strip the "Learning Area N: " prefix for a cleaner printed label
				const laLabel = la ? la.subject_name.replace(/^Learning Area \d+:\s*/i, '') : '';
				tableRows += `<tr>
      <td class="area-name">${laLabel}</td>
      <td class="dot-cell">${la ? nurseryDotSvg(la.score) : ''}</td>
      <td class="area-name">${sk}</td>
      <td class="dot-cell">${sk ? emptyCircle : ''}</td>
      <td class="area-name">${hb}</td>
      <td class="dot-cell">${hb ? emptyCircle : ''}</td>
    </tr>`;
			}

			const totalPupils = S.pupils.filter(p => {
				const cls = S.classes.find(c => c.name === summary.class_name);
				return cls && p.class_id === cls.id;
			}).length;

			w.document.write(`<!DOCTYPE html><html><head>

		//  DOM HELPERS

		function e(tag, attrs, ...kids) {
			const el = document.createElement(tag);
			for (const [k, v] of Object.entries(attrs || {})) {
				if (k === 'class') el.className = v;
				else if (k === 'style') el.style.cssText = v;
				else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
				else el.setAttribute(k, v);
			}
			kids.flat().forEach(c => {if (c != null) el.append(typeof c === 'string' ? c : c);});
			return el;
		}
		const d = (cls, st, ...ch) => e('div', {class: cls || '', style: st || ''}, ...ch);
		const mkSB = v => {const s = e('span', {class: `sb ${scoreClass(v)}`}); s.textContent = v; return s;};
		const mkPosB = p => {const s = e('span', {class: `pb ${p === 1 ? 'pb-1' : p <= 3 ? 'pb-2' : 'pb-n'}`}); s.textContent = `#${p}`; return s;};

		// ══════════════════════════════════════════════════
		//  MARKS TABLE COMPONENT (Excel-style)
		// ══════════════════════════════════════════════════
		function MarksTable(classId, readOnly) {
			const subs = classSubs(classId);
			const ranked = rankPupils(classId);
			const cls = S.classes.find(c => c.id === classId);
			const p7 = cls && isP7Class(cls.name);
			const isTeacher = S.user.role === 'teacher';

			if (!subs.length && !ranked.length) {
				const msg = d('empty');
				msg.textContent = 'No pupils or subjects configured for this class.';
				return msg;
			}
			if (!subs.length) {const msg = d('empty'); msg.textContent = 'No subjects configured for this level.'; return msg;}

			const wrap = d('excel-wrap');
			const tbl = document.createElement('table');
			tbl.className = 'excel-table';

			// thead
			const thead = document.createElement('thead'), hr = document.createElement('tr');
			const thN = e('th', {class: 'sticky-col'}); thN.textContent = 'Pupil'; thN.style.minWidth = '140px'; hr.appendChild(thN);
			subs.forEach(s => {
				const th = document.createElement('th');
				th.textContent = s.name.length > 14 ? s.name.slice(0, 12) + '…' : s.name;
				th.title = s.name; th.style.textAlign = 'center'; hr.appendChild(th);
			});
			['Avg', 'Pos', ...(p7 ? ['Grade'] : []), ''].forEach(h => {
				const th = document.createElement('th'); th.textContent = h; th.style.textAlign = 'center'; hr.appendChild(th);
			});
			thead.appendChild(hr); tbl.appendChild(thead);

			// tbody
			const tbody = document.createElement('tbody');
			if (!ranked.length) {
				const emptyTr = document.createElement('tr');
				const emptyTd = e('td', {colspan: String(subs.length + 4 + (p7 ? 1 : 0)), style: 'text-align:center;color:var(--muted);padding:18px'});
				emptyTd.textContent = 'No pupils yet. Add the first pupil below.';
				emptyTr.appendChild(emptyTd); tbody.appendChild(emptyTr);
			}
			ranked.forEach(p => {
				const tr = document.createElement('tr');
				const tdN = e('td', {class: 'sticky-col'}); tdN.textContent = p.name; tr.appendChild(tdN);

				subs.forEach(s => {
					const td = e('td', {style: 'text-align:center'});
					const val = getScore(p.id, s.id);
					if (readOnly) {td.appendChild(mkSB(val));}
					else {
						const hasPending = S.pending[markKey(p.id, s.id)] !== undefined;
						const inp = e('input', {type: 'number', min: '0', max: '100', step: '1', value: val, class: 'inline-num', style: hasPending ? 'border-color:var(--warn);background:#fffbf0' : ''});
						inp.addEventListener('input', ev => {
							setPending(p.id, s.id, ev.target.value);
							inp.style.borderColor = 'var(--warn)'; inp.style.background = '#fffbf0';
						});
						td.appendChild(inp);
					}
					tr.appendChild(td);
				});

				// avg
				const tdA = e('td', {style: 'text-align:center'});
				const avgEl = e('strong', {id: `avg-${p.id}`, style: 'color:var(--g)'}); avgEl.textContent = p.avg.toFixed(1); tdA.appendChild(avgEl); tr.appendChild(tdA);
				// pos
				const tdP = e('td', {id: `pos-${p.id}`, style: 'text-align:center'}); tdP.appendChild(mkPosB(p.pos)); tr.appendChild(tdP);
				// P7 grade
				if (p7) {
					const tdG = e('td', {id: `grade-${p.id}`, style: 'text-align:center'});
					const pd = pleCalc(p.id, classId);
					const gs = e('span', {class: 'grade-b', style: gradeStyle(pd.grade)}); gs.textContent = pd.grade; tdG.appendChild(gs); tr.appendChild(tdG);
				}
				// print btn
				const tdB = e('td', {style: 'text-align:center'});
				const btn = e('button', {class: 'btn btn-ghost btn-sm'}); btn.textContent = 'Print';
				btn.addEventListener('click', () => {
					const sum = {
						pupil_name: p.name, class_name: cls?.name || '',
						total_score: p.total, average_score: p.avg,
						position: p.pos, uneb_grade: p7 ? pleCalc(p.id, classId).grade : null
					};
					const subjs = subs.map(s => ({subject_name: s.name, score: getScore(p.id, s.id)}));
					printReport(sum, subjs);
				}); tdB.appendChild(btn); tr.appendChild(tdB);
				tbody.appendChild(tr);
			});

			// Add-pupil row — shown for teachers (not read-only) AND for admin in marks view
			if (!readOnly) {
				const addTr = document.createElement('tr');
				addTr.className = 'add-pupil-row';
				const addTd = e('td', {colspan: String(subs.length + 4 + (p7 ? 1 : 0))});
				const form = d('inline-form', 'margin:2px 0');
				const nameIn = e('input', {type: 'text', placeholder: '+ Type pupil name and click Add…', style: 'max-width:280px'});
				const addBtn = e('button', {class: 'btn btn-primary btn-sm', type: 'button'}); addBtn.textContent = 'Add Pupil';
				const doAdd = async () => {
					const nm = nameIn.value.trim(); if (!nm) return;
					addBtn.disabled = true; addBtn.textContent = 'Adding…';
					const err = await addPupil(nm, classId);
					if (err) {addBtn.disabled = false; addBtn.textContent = 'Add Pupil'; alert('Error: ' + err);}
				};
				nameIn.addEventListener('keydown', ev => {if (ev.key === 'Enter') doAdd();});
				addBtn.addEventListener('click', doAdd);
				form.appendChild(nameIn); form.appendChild(addBtn); addTd.appendChild(form); addTr.appendChild(addTd);
				tbody.appendChild(addTr);
			}

			tbl.appendChild(tbody); wrap.appendChild(tbl);
			return wrap;
		}

		// ══════════════════════════════════════════════════
		//  BULK REPORT GENERATION
		// ══════════════════════════════════════════════════
		function showProgressOverlay(label, current, total) {
			let ov = document.getElementById('progress-overlay');
			if (!ov) {
				ov = d('progress-overlay'); ov.id = 'progress-overlay';
				const box = d('progress-box');
				const h3 = e('h3'); h3.id = 'prog-label'; box.appendChild(h3);
				const barWrap = d('progress-bar-wrap'); const fill = d('progress-bar-fill'); fill.id = 'prog-fill'; barWrap.appendChild(fill); box.appendChild(barWrap);
				const pct = e('div', {style: 'font-size:12px;color:var(--muted);margin-top:4px'}); pct.id = 'prog-pct'; box.appendChild(pct);
				const cancelBtn = e('button', {class: 'btn btn-ghost btn-sm', style: 'margin-top:14px'}); cancelBtn.textContent = 'Cancel'; cancelBtn.id = 'prog-cancel';
				cancelBtn.addEventListener('click', () => {S._bulkCancel = true; removeProgressOverlay();});
				box.appendChild(cancelBtn); ov.appendChild(box); document.body.appendChild(ov);
			}
			document.getElementById('prog-label').textContent = label;
			const pct2 = total > 0 ? Math.round((current / total) * 100) : 0;
			document.getElementById('prog-fill').style.width = pct2 + '%';
			document.getElementById('prog-pct').textContent = `${current} / ${total} (${pct2}%)`;
		}
		function removeProgressOverlay() {const ov = document.getElementById('progress-overlay'); if (ov) ov.remove();}

		async function generateReportsForClass(classId) {
			const cls = S.classes.find(c => c.id === classId); if (!cls) return;
			const subs = classSubs(classId);
			const ranked = rankPupils(classId);
			const p7 = isP7Class(cls.name);
			S._bulkCancel = false;
			for (let i = 0; i < ranked.length; i++) {
				if (S._bulkCancel) break;
				const p = ranked[i];
				showProgressOverlay(`Printing ${cls.name} reports…`, i + 1, ranked.length);
				await new Promise(res => setTimeout(res, 120));
				const sum = {pupil_name: p.name, class_name: cls.name, total_score: p.total, average_score: p.avg, position: p.pos, uneb_grade: p7 ? pleCalc(p.id, classId).grade : null};
				const subjs = subs.map(s => ({subject_name: s.name, score: getScore(p.id, s.id)}));
				printReport(sum, subjs);
				await new Promise(res => setTimeout(res, 350));
			}
			removeProgressOverlay();
		}

		async function generateAllReports() {
			S._bulkCancel = false;
			const allPupils = [];
			S.classes.forEach(cls => {
				const subs = classSubs(cls.id);
				const ranked = rankPupils(cls.id);
				const p7 = isP7Class(cls.name);
				ranked.forEach(p => allPupils.push({p, cls, subs, p7}));
			});
			for (let i = 0; i < allPupils.length; i++) {
				if (S._bulkCancel) break;
				const {p, cls, subs, p7} = allPupils[i];
				showProgressOverlay(`Printing all reports (${cls.name})…`, i + 1, allPupils.length);
				await new Promise(res => setTimeout(res, 120));
				const sum = {pupil_name: p.name, class_name: cls.name, total_score: p.total, average_score: p.avg, position: p.pos, uneb_grade: p7 ? pleCalc(p.id, cls.id).grade : null};
				const subjs = subs.map(s => ({subject_name: s.name, score: getScore(p.id, s.id)}));
				printReport(sum, subjs);
				await new Promise(res => setTimeout(res, 350));
			}
			removeProgressOverlay();
		}

				const row = d('', 'display:flex;align-items:baseline;gap:10px;margin-bottom:8px;font-size:13px');
				const lbl = e('span', {style: 'color:var(--muted);font-weight:600;min-width:180px'}); lbl.textContent = label + ':'; row.appendChild(lbl);
				const vl = e('span', {style: 'font-weight:700;color:var(--text)'}); vl.textContent = val; row.appendChild(vl);
				prev.appendChild(row);
			});
			c.appendChild(prev);

			return c;
		}

		// Format date from <input type=date> (YYYY-MM-DD) → readable (e.g. 15th August 2025)
		function formatDate(iso) {
			if (!iso) return '';
			const [y, m, d2] = iso.split('-').map(Number);
			const months = ['January', 'February', 'March', 'April', 'May', 'June',
				'July', 'August', 'September', 'October', 'November', 'December'];
			const suffix = d2 === 1 || d2 === 21 || d2 === 31 ? 'st' : d2 === 2 || d2 === 22 ? 'nd' : d2 === 3 || d2 === 23 ? 'rd' : 'th';
			return `${d2}${suffix} ${months[m - 1]} ${y}`;
		}

		// ══════════════════════════════════════════════════
		//  LOGIN SCREEN
		// ══════════════════════════════════════════════════
		function renderLogin(errMsg) {
			const root = document.getElementById('app'); root.innerHTML = '';
			const wrap = d('login-wrap');
			const card = d('login-card');

			const lw = d('login-logo');
			lw.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="2" y="10" width="20" height="12" rx="2" stroke="#fff" stroke-width="1.5"/><path d="M12 2L2 10h20L12 2z" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/><rect x="9" y="14" width="6" height="8" fill="rgba(255,255,255,.4)"/></svg>`;
			card.appendChild(lw);
			const h1 = e('h1', {class: 'login-h1'}); h1.textContent = 'Hill View Primary School'; card.appendChild(h1);
			const sub = e('p', {class: 'login-sub'}); sub.textContent = 'Report Management System'; card.appendChild(sub);
			if (errMsg) {const eb = d('err-box'); eb.textContent = errMsg; card.appendChild(eb);}

			const ef = d('field'); const el2 = e('label'); el2.textContent = 'Email'; ef.appendChild(el2);
			const ei = e('input', {type: 'email', id: 'lemail', placeholder: 'your@email.com', autocomplete: 'email'}); ef.appendChild(ei); card.appendChild(ef);
			const pf = d('field'); const pl = e('label'); pl.textContent = 'Password'; pf.appendChild(pl);
			const pi = e('input', {type: 'password', id: 'lpw', placeholder: '••••••••', autocomplete: 'current-password'}); pf.appendChild(pi); card.appendChild(pf);

			const btn = e('button', {class: 'btn btn-primary', style: 'width:100%;justify-content:center;margin-top:4px'}); btn.textContent = 'Sign in'; card.appendChild(btn);
			const doSI = async () => {
				btn.disabled = true; btn.innerHTML = '<span class="spin"></span>&ensp;Signing in…';
				const err = await signIn(ei.value.trim(), pi.value);
				if (err) {btn.disabled = false; btn.textContent = 'Sign in'; renderLogin(err);}
			};
			btn.addEventListener('click', doSI);
			pi.addEventListener('keydown', ev => {if (ev.key === 'Enter') doSI();});

			wrap.appendChild(card); root.appendChild(wrap); ei.focus();
		}

		// ══════════════════════════════════════════════════
		//  NAVBAR + SIDEBAR
		// ══════════════════════════════════════════════════
		function renderNavbar() {
			const nav = e('nav', {class: 'navbar'});
			nav.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="2" y="10" width="20" height="12" rx="2" stroke="#fff" stroke-width="1.5"/><path d="M12 2L2 10h20L12 2z" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/><rect x="9" y="14" width="6" height="8" fill="rgba(255,255,255,.4)"/></svg>`;
			const t = e('span', {class: 'nav-brand'}); t.textContent = 'Hill View Primary School'; nav.appendChild(t);
			const u = e('span', {class: 'nav-user'}); u.textContent = S.user.name; nav.appendChild(u);
			const r = e('span', {class: 'badge-role'}); r.textContent = S.user.role; nav.appendChild(r);
			const lo = e('button', {class: 'btn-signout', onclick: signOut}); lo.textContent = 'Sign out'; nav.appendChild(lo);
			return nav;
		}

		// ══════════════════════════════════════════════════
		//  MAIN RENDER
		// ══════════════════════════════════════════════════
		function render() {
			const root = document.getElementById('app'); root.innerHTML = '';
			if (!S.user) {renderLogin(); return;}
			if (S.loading) {
				const app = d('', 'display:flex;flex-direction:column;min-height:100vh');
				app.appendChild(renderNavbar());
				const ld = d('loader'); ld.innerHTML = `<div class="spin"></div>&ensp;Loading…`; app.appendChild(ld);
				root.appendChild(app); return;
			}

			const app = d('', 'display:flex;flex-direction:column;min-height:100vh');
			app.appendChild(renderNavbar());
			const ml = d('main');
			const isAdmin = S.user.role === 'admin';

			let navItems, contentEl;
			if (isAdmin) {
				navItems = [
					{id: 'overview', label: 'Overview', icon: '<rect x="1" y="1" width="6" height="6" rx="1" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1" fill="currentColor" opacity=".5"/><rect x="1" y="9" width="6" height="6" rx="1" fill="currentColor" opacity=".5"/>'},
					{id: 'marks', label: 'Class Marks', icon: '<path d="M1 4h14M1 8h14M1 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>'},
					{id: 'classes', label: 'All Classes', icon: '<rect x="1" y="3" width="14" height="10" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M5 14v2M11 14v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>'},
					{id: 'reports', label: 'Reports', icon: '<path d="M3 2h10l3 3v13H3V2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M6 9h6M6 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>'},
					{id: 'settings', label: 'Settings', icon: '<circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M11.5 3.1l-1.4 1.4M3.1 11.5l1.4 1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>'},
				];
				if (S.view === 'overview') contentEl = ViewOverview();
				else if (S.view === 'marks') contentEl = ViewMarks();
				else if (S.view === 'classes') contentEl = ViewAllClasses();
				else if (S.view === 'settings') contentEl = ViewSettings();
				else contentEl = ViewReports();
			} else {
				navItems = [
					{id: 'marks', label: 'Enter Marks', icon: '<path d="M1 4h14M1 8h14M1 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>'},
					{id: 'summary', label: 'Summary', icon: '<path d="M2 12l5-5 4 4 5-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'},
				];
				contentEl = S.view === 'summary' ? ViewSummary() : ViewMarks();
			}

			const sb = e('aside', {class: 'sidebar'});
			navItems.forEach(({id, label, icon}) => {
				const btn = e('button', {class: 'nav-item' + (S.view === id ? ' active' : '')});
				btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 16 16" fill="none">${icon}</svg><span>${label}</span>`;
				btn.addEventListener('click', () => {
					if (id === 'reports' && !S.reportPupils.length) {S.view = id; S.reportSummary = null; render(); loadReportPupils();}
					else {S.view = id; render();}
				}); sb.appendChild(btn);
			});

			ml.appendChild(sb); ml.appendChild(contentEl); app.appendChild(ml); root.appendChild(app);
		}

		// ══════════════════════════════════════════════════
		//  BOOT
		// ══════════════════════════════════════════════════
		(async function boot() {
			const {data: {session}} = await db.auth.getSession();
			if (session) {
				// 'users' table — not 'profiles' — matches actual hill-view-ps schema
				const {data: u} = await db.from('users').select('id,name,email,role,class_id').eq('id', session.user.id).single();
				if (u) {S.user = u; S.view = u.role === 'admin' ? 'overview' : 'marks'; await loadAll(); return;}
			}
			S.loading = false; render();
			db.auth.onAuthStateChange(ev => {
				if (ev === 'SIGNED_OUT') {Object.assign(S, {user: null, loading: false, classes: [], subjects: [], pupils: [], marksMap: {}, classPerf: [], submissions: [], selClass: null, pending: {}, reportPupils: [], reportSelId: null, reportSummary: null, reportSubjects: []}); render();}
			});
		})();
	</script>
</body>
